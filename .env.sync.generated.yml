version: 1
defaults:
  add_missing: true
  remove_extra: false
  backup: true
  default_mode: report
  apply_managed_changes: false
  validate_rule_keys_in_source: false
  backup_dir: .env-backups
keys:
  PRODUCT_NAME:
    description: Product display name shown in reports and runtime metadata.
    required: true
    policy: managed
    auto_apply: true
    default: GLPI Operations Kit
  PRODUCT_SLUG:
    description: Stable product slug for labels and automation.
    required: false
    policy: protected
  PRODUCT_DEPLOYMENT_LABEL:
    description: Deployment label for this package instance.
    required: false
    policy: protected
  CUSTOMER_DISPLAY_NAME:
    description: Customer-facing name used in labels and dashboards.
    required: true
    policy: protected
  CUSTOMER_SHORT_NAME:
    description: Short customer identifier used in tags.
    required: false
    policy: protected
  ENVIRONMENT_NAME:
    description: Logical environment name consumed by scripts and reports.
    required: true
    policy: protected
    default: example
    example: staging
  ENVIRONMENT_STAGE:
    description: Human-readable environment stage used in labels.
    required: false
    policy: protected
    example: staging
  EXECUTION_MODE:
    description: Execution mode for orchestration.
    required: false
    policy: review_required
    default: local
    allowed_values:
    - local
    - ssh
    reason: Muda o modelo operacional (local/ssh) e pré-requisitos de execução.
    impact: Valor incorreto pode quebrar orquestração e impedir deploy/check.
    validation:
    - Validar modo com a topologia operacional do ambiente.
    - Para ssh, validar usuário/chave e conectividade.
    - Executar deploy check após alteração.
  EXECUTION_HOST_ROLE_DEFAULT:
    description: Default host role for local mode.
    required: false
    policy: review_required
    default: all
    allowed_values:
    - all
    - app
    - db
    reason: Controla escopo de ações mutáveis em execução local.
    impact: Papel incorreto pode aplicar etapas no host errado.
    validation:
    - Confirmar se o host atual é app, db ou all.
    - Executar deploy check com escopo correspondente.
    - Validar sequência operacional no runbook.
  TOPOLOGY_MODE:
    description: Target topology.
    required: false
    policy: review_required
    default: dual-server
    allowed_values:
    - dual-server
    - single-server
    reason: Altera fluxo entre single-server e dual-server.
    impact: Modo incorreto pode executar roles fora da topologia real.
    validation:
    - Confirmar topologia real do ambiente alvo.
    - Validar aliases e endpoints app/db.
    - Executar pré-checks e smoke tests após alteração.
  TOPOLOGY_APP_ALIAS:
    description: Inventory alias for application host.
    required: true
    policy: protected
    example: app-node
  TOPOLOGY_APP_HOST:
    description: Application host endpoint.
    required: true
    policy: protected
    example: 192.0.2.10
  TOPOLOGY_DB_ALIAS:
    description: Inventory alias for database host.
    required: true
    policy: protected
    example: app-node
  TOPOLOGY_DB_HOST:
    description: Database host endpoint.
    required: true
    policy: protected
    example: 192.0.2.10
  NETWORK_SSH_USER:
    description: SSH username used only when EXECUTION_MODE=ssh.
    required: false
    policy: protected
    example: ubuntu
  NETWORK_SSH_PRIVATE_KEY_PATH:
    description: SSH private key used only when EXECUTION_MODE=ssh.
    required: false
    policy: protected
    secret: true
  NETWORK_DATABASE_APP_ACCESS_HOST:
    description: App host allowed to connect to MariaDB (grant scope).
    required: false
    policy: review_required
    default: 192.0.2.10
    reason: Define origem de acesso APP->DB e impacta grants/firewall.
    impact: Valor incorreto bloqueia conexão com o banco.
    validation:
    - Validar host de origem efetivo da aplicação.
    - Validar grants e firewall após alteração.
    - Executar teste de conectividade APP -> DB.
  NETWORK_DATABASE_ACCESS_MODE:
    description: Database network access mode.
    required: false
    policy: review_required
    default: restricted
    allowed_values:
    - open
    - restricted
    reason: Altera modelo de exposição de rede e escopo de firewall/grants.
    impact: Configuração incorreta pode bloquear a aplicação ou ampliar exposição
      do banco.
    validation:
    - Validar regras de firewall e grants após alteração.
    - Validar conectividade APP -> DB com testes de deploy.
    - Quando open, manter NETWORK_DATABASE_ALLOWED_SOURCE_HOSTS vazio.
  NETWORK_DATABASE_ALLOWED_SOURCE_HOSTS:
    description: CSV allowlist for DB access firewall/grants.
    required: false
    policy: review_required
    default: 192.0.2.10,192.0.2.11
    reason: Afeta superfície de acesso ao banco e depende de topologia/rede real.
    impact: Valor incorreto pode causar indisponibilidade ou exposição indevida.
    validation:
    - Revisar lista de origens com equipe de rede.
    - Confirmar que hosts autorizados correspondem ao ambiente alvo.
    - Executar teste de conectividade após alteração.
  GLPI_VERSION:
    description: GLPI target version.
    required: true
    policy: review_required
    default: 11.0.0
    reason: Troca de versão implica mudança de release e potencial impacto funcional.
    impact: Versão incompatível pode causar falha de upgrade/deploy ou regressão.
    validation:
    - Validar compatibilidade da versão com o runbook e plugins.
    - Executar deploy check e smoke tests após alteração.
    - Validar plano de rollback antes de promover.
  GLPI_DOMAIN:
    description: GLPI endpoint domain or hostname.
    required: true
    policy: protected
    example: glpi.example.internal
  WEB_SERVER_TYPE:
    description: Web server type supported by GLPI.
    required: true
    policy: review_required
    default: nginx
    allowed_values:
    - apache
    - lighttpd
    - nginx
    reason: Muda pacotes e templates aplicados no host de aplicação.
    impact: Escolha incorreta pode quebrar roteamento web e serviço HTTP(S).
    validation:
    - Validar compatibilidade com o host alvo.
    - Executar validação de configuração web após deploy.
    - Executar smoke test de acesso à aplicação.
  GLPI_UPLOAD_MAX_FILESIZE:
    description: PHP upload max size.
    required: false
    policy: protected
  GLPI_POST_MAX_SIZE:
    description: PHP post max size.
    required: false
    policy: protected
  GLPI_MEMORY_LIMIT:
    description: PHP memory limit.
    required: false
    policy: protected
  GLPI_MAX_EXECUTION_TIME:
    description: PHP max execution time in seconds.
    required: false
    policy: protected
  GLPI_OPCACHE_MEMORY_CONSUMPTION:
    description: PHP OPcache memory consumption in MB.
    required: false
    policy: protected
  GLPI_CRON_SCHEDULE:
    description: GLPI cron schedule.
    required: false
    policy: protected
  GLPI_FILESYSTEM_OWNER:
    description: Owner of writable GLPI runtime paths.
    required: false
    policy: protected
  GLPI_FILESYSTEM_GROUP:
    description: Group of writable GLPI runtime paths.
    required: false
    policy: protected
  GLPI_APP_PACKAGES:
    description: Application packages (CSV).
    required: false
    policy: protected
  DATABASE_NAME:
    description: GLPI database schema name.
    required: true
    policy: protected
    example: glpi_operational
  DATABASE_USER:
    description: GLPI database username.
    required: true
    policy: protected
    secret: true
    example: nehemiah_glpi
  DATABASE_PASSWORD:
    description: GLPI database password.
    required: true
    policy: protected
    secret: true
  DATABASE_MANAGED_ADMIN_PASSWORD:
    description: Managed DB fallback admin password used only for connectivity validation
      attempts.
    required: false
    policy: protected
    secret: true
    reason: Opcional para fallback de conectividade no modo managed.
  DATABASE_DEPLOYMENT_MODE:
    description: Database deployment mode.
    required: false
    policy: review_required
    default: self_hosted
    allowed_values:
    - managed
    - self_hosted
    reason: Alterna entre fluxo self-hosted e managed com diferenças operacionais
      relevantes.
    impact: Modo incorreto pode acionar automações incompatíveis com a infraestrutura.
    validation:
    - Confirmar modelo de banco do ambiente alvo.
    - Validar conectividade e credenciais para o modo escolhido.
    - Executar checks completos de deploy após alteração.
  DATABASE_ROOT_PASSWORD:
    description: MariaDB root password for provisioning and maintenance.
    required: false
    policy: protected
    secret: true
    reason: Obrigatória quando DATABASE_DEPLOYMENT_MODE=self_hosted.
  DATABASE_PORT:
    description: MariaDB TCP port.
    required: false
    policy: protected
  DATABASE_BIND_ADDRESS:
    description: MariaDB bind address.
    required: false
    policy: protected
  DATABASE_PACKAGES:
    description: Database package list (CSV).
    required: false
    policy: protected
  PHP_FPM_SERVICE_NAME:
    description: PHP-FPM service name.
    required: false
    policy: protected
  PHP_FPM_SOCKET:
    description: PHP-FPM socket path.
    required: false
    policy: protected
  PHP_FPM_PM:
    description: PHP-FPM process manager.
    required: false
    policy: protected
    example: dynamic
  WEB_HTTP_PORT:
    description: Web HTTP port.
    required: true
    policy: review_required
    default: '80'
    reason: Mudança de porta pode exigir ajuste de firewall, proxy e health checks.
    impact: Porta incorreta pode tornar a aplicação inacessível.
    validation:
    - Verificar bind da porta no host da aplicação.
    - Validar regras de firewall e proxy reverso.
    - Executar smoke test HTTP após alteração.
  WEB_HTTPS_PORT:
    description: Web HTTPS port.
    required: true
    policy: review_required
    default: '443'
    reason: Mudança de porta TLS impacta certificados, firewall e acesso externo.
    impact: Porta incorreta pode quebrar acesso seguro e validação de TLS.
    validation:
    - Verificar bind da porta TLS no host da aplicação.
    - Validar firewall e balanceador/proxy.
    - Executar validação de certificado e acesso HTTPS.
  TLS_MODE:
    description: TLS mode.
    required: true
    policy: review_required
    default: none
    allowed_values:
    - none
    - provided
    - self_signed
    reason: Altera fluxo operacional de certificados e exposição HTTPS.
    impact: Modo incorreto pode interromper acesso seguro ou falhar validações de
      segurança.
    validation:
    - Validar pré-requisitos do modo selecionado (arquivos/certificados).
    - Executar check de TLS e smoke test HTTPS.
    - Validar política de segurança do ambiente.
  TLS_COMMON_NAME:
    description: TLS common name used for certificate validation/self-signed generation.
    required: false
    policy: protected
  TLS_CERTIFICATE_PATH:
    description: Certificate path on target app host.
    required: false
    policy: protected
  TLS_PRIVATE_KEY_PATH:
    description: Private key path on target app host.
    required: false
    policy: protected
    secret: true
  TLS_PROVIDED_LOCAL_CERT_PATH:
    description: Local certificate source path used by install-provided workflow.
    required: false
    policy: protected
  TLS_PROVIDED_LOCAL_KEY_PATH:
    description: Local private key source path used by install-provided workflow.
    required: false
    policy: protected
  BACKUP_BASE_DIR:
    description: Backup base directory on target host.
    required: false
    policy: protected
  BACKUP_RETENTION_DAYS:
    description: Backup retention in days.
    required: false
    policy: protected
  MONITORING_NODE_EXPORTER_ENABLED:
    description: Enable Node Exporter deployment.
    required: false
    policy: review_required
    default: 'true'
    allowed_values:
    - 'true'
    - 'false'
    reason: Ativa/desativa componente operacional de monitoramento.
    impact: Configuração incorreta pode reduzir observabilidade ou gerar ruído.
    validation:
    - Validar política de monitoramento do ambiente.
    - Confirmar status do exporter após alteração.
    - Validar scrape e alertas relacionados.
  MONITORING_MYSQLD_EXPORTER_ENABLED:
    description: Enable mysqld_exporter deployment.
    required: false
    policy: review_required
    default: 'true'
    allowed_values:
    - 'true'
    - 'false'
    reason: Ativa/desativa exporter de banco com dependência de credenciais e grants.
    impact: Configuração incorreta pode ocultar métricas críticas de banco.
    validation:
    - Validar modo de banco e necessidade do exporter.
    - Confirmar credenciais/grants quando habilitado.
    - Validar scrape e alertas relacionados ao banco.
  MONITORING_MYSQLD_EXPORTER_USER:
    description: mysqld_exporter username.
    required: true
    policy: protected
    secret: true
    example: issachar_monitor
  MONITORING_MYSQLD_EXPORTER_PASSWORD:
    description: mysqld_exporter password.
    required: false
    policy: protected
    secret: true
    reason: Obrigatória quando DATABASE_DEPLOYMENT_MODE=self_hosted.
  MONITORING_LABELS_JSON:
    description: Monitoring labels as JSON object.
    required: false
    policy: protected
  MONITORING_THRESHOLDS_JSON:
    description: Monitoring threshold catalog as JSON object.
    required: false
    policy: protected
  MONITORING_SCRAPE_PROFILES_JSON:
    description: Scrape profiles as JSON object.
    required: false
    policy: protected
  MONITORING_DASHBOARD_PROFILE:
    description: Dashboard profile label.
    required: false
    policy: protected
  MONITORING_ALERT_ROUTES_JSON:
    description: Alert routing contract as JSON object.
    required: false
    policy: protected
  ALERTING_TLS_EXPIRY_WARNING_DAYS:
    description: Days before TLS expiration alert.
    required: false
    policy: protected
  ALERTING_BACKUP_FAILURE_ENABLED:
    description: Backup failure alert toggle.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'true'
  ALERTING_SERVICE_DOWN_ENABLED:
    description: Service down alert toggle.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'true'
  SECURITY_ALLOW_INSECURE_NON_PRODUCTION:
    description: Flag for allowing insecure modes when accepted by operator policy.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'true'
  SECURITY_REQUIRE_TLS:
    description: Require TLS mode to be provided.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'false'
  SECURITY_REQUIRE_HTTPS:
    description: Require HTTPS/TLS enabled.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'false'
  SECURITY_REQUIRE_PROMOTION_GATE:
    description: Require staging certification gate artifact.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'false'
  SECURITY_REQUIRE_ORDERED_EXECUTION:
    description: Require deploy order check -> db -> app -> monitoring -> backup ->
      post-check.
    required: false
    policy: protected
    allowed_values:
    - 'true'
    - 'false'
    example: 'true'
  OPERATIONS_ASSUME_DB_APPLIED:
    description: Confirm DB apply was already completed on another host before running
      app apply
    required: false
    policy: protected
    example: 'false'
  PATH_GLPI_RELEASE_ROOT:
    description: GLPI release extraction root.
    required: false
    policy: protected
  PATH_GLPI_INSTALL_DIR:
    description: GLPI installation directory.
    required: false
    policy: protected
  PATH_GLPI_CONFIG_DIR:
    description: GLPI config directory (outside web root).
    required: false
    policy: protected
  PATH_GLPI_VAR_DIR:
    description: GLPI variable directory (outside web root).
    required: false
    policy: protected
  PATH_GLPI_PLUGIN_DIR:
    description: GLPI plugins directory.
    required: false
    policy: protected
  PATH_GLPI_LOG_DIR:
    description: GLPI logs directory.
    required: false
    policy: protected
  OPERATIONS_TIMEZONE:
    description: System timezone.
    required: true
    policy: review_required
    default: America/Sao_Paulo
    reason: Afeta agendamentos, logs e consistência temporal operacional.
    impact: Timezone incorreta pode causar inconsistência de logs e execução em horário
      indevido.
    validation:
    - Validar timezone no SO e no runtime após alteração.
    - Confirmar impacto em janelas operacionais e cron.
    - Revisar evidências e timestamps pós-deploy.
  GLPI_TIMEZONE_SUPPORT_ENABLED:
    description: Enable GLPI timezone support checks/workflows.
    required: false
    policy: review_required
    default: 'false'
    allowed_values:
    - 'true'
    - 'false'
    reason: Alterar GLPI_TIMEZONE_SUPPORT_ENABLED pode exigir revisão operacional
      do ambiente.
    impact: Configuração incorreta pode causar falha de deploy, indisponibilidade
      ou regressão.
    validation:
    - Executar pré-checks e validações operacionais após a alteração.
    - Revisar conectividade e serviços dependentes do valor alterado.
    - Validar logs e smoke tests no ambiente alvo.
  GLPI_TIMEZONE_DB_MODE:
    description: Timezone behavior for DB layer.
    required: false
    policy: review_required
    default: disabled
    allowed_values:
    - apply
    - disabled
    - validate
    reason: Alterar GLPI_TIMEZONE_DB_MODE pode exigir revisão operacional do ambiente.
    impact: Configuração incorreta pode causar falha de deploy, indisponibilidade
      ou regressão.
    validation:
    - Executar pré-checks e validações operacionais após a alteração.
    - Revisar conectividade e serviços dependentes do valor alterado.
    - Validar logs e smoke tests no ambiente alvo.
  GLPI_TIMEZONE_DB_LEGACY_GRANT:
    description: Optional legacy grant for older GLPI workflows.
    required: false
    policy: review_required
    default: 'false'
    allowed_values:
    - 'true'
    - 'false'
    reason: Alterar GLPI_TIMEZONE_DB_LEGACY_GRANT pode exigir revisão operacional
      do ambiente.
    impact: Configuração incorreta pode causar falha de deploy, indisponibilidade
      ou regressão.
    validation:
    - Executar pré-checks e validações operacionais após a alteração.
    - Revisar conectividade e serviços dependentes do valor alterado.
    - Validar logs e smoke tests no ambiente alvo.
  OPERATIONS_GLPI_CRON_SCHEDULE:
    description: GLPI cron schedule used by application role.
    required: false
    policy: protected
  OPERATIONS_REQUIRED_OPS_GROUP:
    description: Required Linux group for operators.
    required: false
    policy: protected
    example: glpiops
  OPERATIONS_SECURITY_MODE_DEFAULT:
    description: Default security mode when SECURITY_MODE is not passed in command
      line.
    required: false
    policy: protected
    example: secure
  OPERATIONS_PERMISSIVE_JUSTIFICATION:
    description: Mandatory justification used only when OPERATIONS_SECURITY_MODE_DEFAULT=permissive
    required: false
    policy: protected
  RESOURCE_PROFILE_ACTIVE:
    description: Active sizing profile consumed by runtime renderer.
    required: true
    policy: review_required
    default: small
    allowed_values:
    - small
    - medium
    - large
    reason: Muda limites de recursos e tuning de runtime.
    impact: Perfil inadequado pode degradar performance ou estabilidade.
    validation:
    - Validar capacidade de CPU/memória do host.
    - Executar check de serviços após alteração de perfil.
    - Monitorar métricas e erros após deploy.
  RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN:
    description: Configuração da variável de ambiente RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN.
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_PHP_START_SERVERS:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_PHP_MIN_SPARE_SERVERS:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_PHP_MAX_SPARE_SERVERS:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_PHP_MAX_REQUESTS:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_INNODB_BUFFER_POOL_SIZE:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_MAX_CONNECTIONS:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_TMP_TABLE_SIZE:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_MAX_HEAP_TABLE_SIZE:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_SLOW_QUERY_LOG:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_SMALL_MARIADB_LONG_QUERY_TIME:
    description: RESOURCE_PROFILE_SMALL_PHP_MAX_CHILDREN=20
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN:
    description: Configuração da variável de ambiente RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN.
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_PHP_START_SERVERS:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_PHP_MIN_SPARE_SERVERS:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_PHP_MAX_SPARE_SERVERS:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_PHP_MAX_REQUESTS:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_INNODB_BUFFER_POOL_SIZE:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_MAX_CONNECTIONS:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_TMP_TABLE_SIZE:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_MAX_HEAP_TABLE_SIZE:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_SLOW_QUERY_LOG:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_MEDIUM_MARIADB_LONG_QUERY_TIME:
    description: RESOURCE_PROFILE_MEDIUM_PHP_MAX_CHILDREN=35
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN:
    description: Configuração da variável de ambiente RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN.
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_PHP_START_SERVERS:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_PHP_MIN_SPARE_SERVERS:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_PHP_MAX_SPARE_SERVERS:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_PHP_MAX_REQUESTS:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_MARIADB_INNODB_BUFFER_POOL_SIZE:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
    policy: protected
  RESOURCE_PROFILE_LARGE_MARIADB_MAX_CONNECTIONS:
    description: RESOURCE_PROFILE_LARGE_PHP_MAX_CHILDREN=50
    required: false
