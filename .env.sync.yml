version: 1

defaults:
  add_missing: true
  remove_extra: false
  backup: true
  default_mode: report
  apply_managed_changes: false
  backup_dir: ".env-backups"

keys:
  PRODUCT_NAME:
    description: "Nome do produto exibido em relatórios e metadados de runtime."
    required: true
    policy: managed
    auto_apply: true
    default: "GLPI Operations Kit"

  CUSTOMER_DISPLAY_NAME:
    description: "Nome do cliente usado em rótulos e dashboards."
    required: true
    policy: protected
    example: "Example Customer"

  ENVIRONMENT_NAME:
    description: "Nome lógico do ambiente usado por scripts e relatórios."
    required: true
    policy: protected
    example: "staging"

  TOPOLOGY_APP_ALIAS:
    description: "Alias de inventário do host de aplicação."
    required: true
    policy: protected
    example: "app-node"

  TOPOLOGY_APP_HOST:
    description: "Endpoint do host de aplicação."
    required: true
    policy: protected
    example: "192.0.2.10"

  TOPOLOGY_DB_ALIAS:
    description: "Alias de inventário do host de banco de dados."
    required: true
    policy: protected
    example: "db-node"

  TOPOLOGY_DB_HOST:
    description: "Endpoint do host de banco de dados."
    required: true
    policy: protected
    example: "192.0.2.20"

  NETWORK_DATABASE_APP_ACCESS_HOST:
    description: "Origem de aplicação autorizada para grants no banco."
    required: true
    policy: protected
    example: "192.0.2.10"

  NETWORK_DATABASE_ACCESS_MODE:
    description: "Modo de acesso de rede ao banco de dados."
    required: true
    policy: review_required
    default: restricted
    allowed_values:
      - restricted
      - open
    reason: "Altera modelo de exposição de rede e escopo de firewall/grants."
    impact: "Configuração incorreta pode bloquear a aplicação ou ampliar exposição do banco."
    validation:
      - "Validar regras de firewall e grants após alteração."
      - "Validar conectividade APP -> DB com testes de deploy."
      - "Quando open, manter NETWORK_DATABASE_ALLOWED_SOURCE_HOSTS vazio."

  NETWORK_DATABASE_ALLOWED_SOURCE_HOSTS:
    description: "Lista CSV de origens permitidas para acesso ao banco em modo restrito."
    required: false
    policy: review_required
    reason: "Afeta superfície de acesso ao banco e depende de topologia/rede real."
    impact: "Valor incorreto pode causar indisponibilidade ou exposição indevida."
    validation:
      - "Revisar lista de origens com equipe de rede."
      - "Confirmar que hosts autorizados correspondem ao ambiente alvo."
      - "Executar teste de conectividade após alteração."

  GLPI_VERSION:
    description: "Versão alvo do GLPI usada em deploy e download."
    required: true
    policy: review_required
    reason: "Troca de versão implica mudança de release e potencial impacto funcional."
    impact: "Versão incompatível pode causar falha de upgrade/deploy ou regressão."
    validation:
      - "Validar compatibilidade da versão com o runbook e plugins."
      - "Executar deploy check e smoke tests após alteração."
      - "Validar plano de rollback antes de promover."

  GLPI_DOMAIN:
    description: "Domínio/hostname público do GLPI."
    required: true
    policy: protected
    example: "glpi.example.internal"

  WEB_SERVER_TYPE:
    description: "Servidor web usado pelo stack GLPI."
    required: true
    policy: review_required
    allowed_values:
      - nginx
      - apache
      - lighttpd
    reason: "Muda pacotes e templates aplicados no host de aplicação."
    impact: "Escolha incorreta pode quebrar roteamento web e serviço HTTP(S)."
    validation:
      - "Validar compatibilidade com o host alvo."
      - "Executar validação de configuração web após deploy."
      - "Executar smoke test de acesso à aplicação."

  DATABASE_NAME:
    description: "Nome do schema SQL do GLPI."
    required: true
    policy: protected

  DATABASE_USER:
    description: "Usuário SQL da aplicação GLPI."
    required: true
    policy: protected
    secret: true

  DATABASE_PASSWORD:
    description: "Senha do usuário SQL da aplicação GLPI."
    required: true
    policy: protected
    secret: true

  DATABASE_MANAGED_ADMIN_PASSWORD:
    description: "Senha admin opcional para validação de conectividade em modo managed."
    required: false
    policy: protected
    secret: true

  DATABASE_ROOT_PASSWORD:
    description: "Senha root/provisionamento MariaDB (self_hosted)."
    required: false
    policy: protected
    secret: true
    reason: "Obrigatória quando DATABASE_DEPLOYMENT_MODE=self_hosted."

  WEB_HTTP_PORT:
    description: "Porta HTTP do servidor web."
    required: true
    policy: review_required
    default: "80"
    reason: "Mudança de porta pode exigir ajuste de firewall, proxy e health checks."
    impact: "Porta incorreta pode tornar a aplicação inacessível."
    validation:
      - "Verificar bind da porta no host da aplicação."
      - "Validar regras de firewall e proxy reverso."
      - "Executar smoke test HTTP após alteração."

  WEB_HTTPS_PORT:
    description: "Porta HTTPS do servidor web."
    required: true
    policy: review_required
    default: "443"
    reason: "Mudança de porta TLS impacta certificados, firewall e acesso externo."
    impact: "Porta incorreta pode quebrar acesso seguro e validação de TLS."
    validation:
      - "Verificar bind da porta TLS no host da aplicação."
      - "Validar firewall e balanceador/proxy."
      - "Executar validação de certificado e acesso HTTPS."

  TLS_MODE:
    description: "Modo TLS aplicado ao ambiente."
    required: true
    policy: review_required
    allowed_values:
      - none
      - self_signed
      - provided
    reason: "Altera fluxo operacional de certificados e exposição HTTPS."
    impact: "Modo incorreto pode interromper acesso seguro ou falhar validações de segurança."
    validation:
      - "Validar pré-requisitos do modo selecionado (arquivos/certificados)."
      - "Executar check de TLS e smoke test HTTPS."
      - "Validar política de segurança do ambiente."

  MONITORING_MYSQLD_EXPORTER_USER:
    description: "Usuário SQL do mysqld_exporter."
    required: true
    policy: protected
    secret: true

  MONITORING_MYSQLD_EXPORTER_PASSWORD:
    description: "Senha do mysqld_exporter."
    required: false
    policy: protected
    secret: true
    reason: "Obrigatória quando DATABASE_DEPLOYMENT_MODE=self_hosted."

  OPERATIONS_TIMEZONE:
    description: "Timezone do sistema usada nas operações do kit."
    required: true
    policy: review_required
    default: "America/Sao_Paulo"
    reason: "Afeta agendamentos, logs e consistência temporal operacional."
    impact: "Timezone incorreta pode causar inconsistência de logs e execução em horário indevido."
    validation:
      - "Validar timezone no SO e no runtime após alteração."
      - "Confirmar impacto em janelas operacionais e cron."
      - "Revisar evidências e timestamps pós-deploy."

  RESOURCE_PROFILE_ACTIVE:
    description: "Perfil ativo de sizing para parâmetros de PHP/MariaDB."
    required: true
    policy: review_required
    allowed_values:
      - small
      - medium
      - large
    default: small
    reason: "Muda limites de recursos e tuning de runtime."
    impact: "Perfil inadequado pode degradar performance ou estabilidade."
    validation:
      - "Validar capacidade de CPU/memória do host."
      - "Executar check de serviços após alteração de perfil."
      - "Monitorar métricas e erros após deploy."
