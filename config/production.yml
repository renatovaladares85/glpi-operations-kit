product:
  name: "GLPI Operations Kit"
  slug: "glpi-operations-kit"
  deployment_label: "production-reference"

customer:
  display_name: "Example Customer"
  short_name: "example-customer"

environment:
  name: "production"
  stage: "production"

topology:
  mode: "dual-server"
  app:
    alias: "prd-app"
    host: "192.0.2.30"
  db:
    alias: "prd-db"
    host: "192.0.2.40"

network:
  ssh:
    user: "ubuntu"
    private_key_path: "~/.ssh/glpi_production_ed25519"
  database:
    app_access_host: "192.0.2.30"
    allowed_source_hosts:
      - "192.0.2.30"

glpi:
  version: "11.0.0"
  domain: "glpi.example.internal"
  upload_max_filesize: "64M"
  post_max_size: "64M"
  memory_limit: "1024M"
  max_execution_time: 120
  opcache_memory_consumption: 256
  filesystem:
    owner: "www-data"
    group: "www-data"
  app_packages:
    - "nginx"
    - "php-fpm"
    - "php-cli"
    - "php-curl"
    - "php-gd"
    - "php-intl"
    - "php-mbstring"
    - "php-mysql"
    - "php-xml"
    - "php-zip"
    - "php-bz2"
    - "php-apcu"
    - "php-ldap"
    - "php-imap"
    - "php-opcache"
    - "php-redis"
    - "tar"
    - "xz-utils"
    - "curl"
    - "openssl"

database:
  name: "glpi_operational"
  user: "nehemiah_glpi"
  port: 3306
  bind_address: "0.0.0.0"
  packages:
    - "mariadb-server"
    - "mariadb-client"
    - "python3-pymysql"

php_fpm:
  service_name: "php8.3-fpm"
  socket: "/run/php/php8.3-fpm.sock"
  pm: "dynamic"

nginx:
  http_port: 80
  https_port: 443

tls:
  mode: "provided"
  common_name: "glpi.example.internal"
  certificate_path: "/etc/ssl/certs/glpi-production.crt"
  private_key_path: "/etc/ssl/private/glpi-production.key"
  provided_local_cert_path: ""
  provided_local_key_path: ""

backup:
  base_dir: "/var/backups/glpi"
  retention_days: 30

monitoring:
  exporters:
    node:
      enabled: true
    mysqld:
      enabled: true
      user: "issachar_monitor"
  labels:
    product: "glpi"
    service: "itsm"
    customer: "example-customer"
    environment: "production"
  thresholds:
    cpu_warning_percent: 80
    cpu_critical_percent: 90
    memory_warning_percent: 80
    memory_critical_percent: 90
    disk_warning_percent: 80
    disk_critical_percent: 90
    tls_expiry_warning_days: 30
  scrape_profiles:
    default:
      interval: "30s"
      timeout: "10s"
  dashboard_profile: "glpi-standard"
  alert_routes:
    default_receiver: "operations-team"
    escalation_policy: "customer-on-call"

alerting:
  tls_expiry_warning_days: 30
  backup_failure_enabled: true
  service_down_enabled: true

security:
  sso_enabled: true
  allow_insecure_non_production: false
  require_tls: true
  require_https: true
  require_sso: true
  require_promotion_gate: true
  require_ordered_execution: true

paths:
  glpi_release_root: "/usr/share"
  glpi_install_dir: "/usr/share/glpi"
  glpi_config_dir: "/etc/glpi"
  glpi_var_dir: "/var/lib/glpi/files"
  glpi_plugin_dir: "/var/lib/glpi/plugins"
  glpi_log_dir: "/var/log/glpi"

operations:
  timezone: "America/Sao_Paulo"
  glpi_cron_schedule: "*/5 * * * *"
  required_ops_group: "glpiops"
  security_mode_default: "secure"

resource_profiles:
  active: "large"
  profiles:
    small:
      php_fpm:
        max_children: 20
        start_servers: 4
        min_spare_servers: 2
        max_spare_servers: 6
        max_requests: 500
      mariadb:
        innodb_buffer_pool_size: "2G"
        max_connections: 80
        tmp_table_size: "128M"
        max_heap_table_size: "128M"
        slow_query_log: 1
        long_query_time: 2
    medium:
      php_fpm:
        max_children: 35
        start_servers: 6
        min_spare_servers: 3
        max_spare_servers: 10
        max_requests: 500
      mariadb:
        innodb_buffer_pool_size: "8G"
        max_connections: 120
        tmp_table_size: "192M"
        max_heap_table_size: "192M"
        slow_query_log: 1
        long_query_time: 2
    large:
      php_fpm:
        max_children: 50
        start_servers: 8
        min_spare_servers: 4
        max_spare_servers: 12
        max_requests: 500
      mariadb:
        innodb_buffer_pool_size: "24G"
        max_connections: 180
        tmp_table_size: "256M"
        max_heap_table_size: "256M"
        slow_query_log: 1
        long_query_time: 2
