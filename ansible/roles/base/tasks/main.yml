---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base operating system packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - unzip
      - ufw
      - chrony
      - rsync
      - jq
      - htop
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Configure timezone
  community.general.timezone:
    name: "{{ timezone_name }}"

- name: Ensure chrony is enabled
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Deploy ssh hardening snippet
  ansible.builtin.template:
    src: ssh-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-glpi-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Set default deny incoming firewall policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Allow SSH access
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP access on app hosts
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: "'glpi_app' in group_names"

- name: Allow HTTPS access on app hosts
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: "'glpi_app' in group_names"

- name: Ensure firewall is enabled
  community.general.ufw:
    state: enabled
