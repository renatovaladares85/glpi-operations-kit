---
- name: Validate base role platform family
  ansible.builtin.assert:
    that:
      - platform_family is defined
      - platform_family in base_chrony_service_by_family
    fail_msg: >-
      Unsupported platform_family '{{ platform_family | default('undefined') }}' for the base role.
      Supported families: {{ base_chrony_service_by_family.keys() | list | sort | join(', ') }}.

- name: Update apt cache on Debian-like hosts
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: platform_family | default('debian') == 'debian'

- name: Install base operating system packages
  ansible.builtin.package:
    name: "{{ base_os_packages_by_family[platform_family | default('debian')] }}"
    state: present
  vars:
    base_os_packages_by_family:
      debian:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - software-properties-common
        - unzip
        - ufw
        - chrony
        - rsync
        - jq
        - htop
        - unattended-upgrades
        - apt-listchanges
      rhel:
        - ca-certificates
        - curl
        - gnupg2
        - unzip
        - firewalld
        - chrony
        - rsync
        - jq
        - htop

- name: Read current timezone
  ansible.builtin.command: timedatectl show -p Timezone --value
  register: current_timezone
  changed_when: false

- name: Configure timezone
  ansible.builtin.command: "timedatectl set-timezone {{ timezone_name }}"
  when: current_timezone.stdout != timezone_name

- name: Ensure chrony service is enabled
  ansible.builtin.service:
    name: "{{ base_chrony_service_by_family[platform_family] }}"
    state: started
    enabled: true

- name: Deploy ssh hardening snippet
  ansible.builtin.template:
    src: ssh-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-glpi-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Set default deny incoming firewall policy on Debian-like hosts
  ansible.builtin.command: ufw default deny incoming
  changed_when: false
  when: platform_family | default('debian') == 'debian'

- name: Allow SSH access on Debian-like hosts
  ansible.builtin.command: ufw allow 22/tcp
  changed_when: false
  when: platform_family | default('debian') == 'debian'

- name: Allow HTTP access on Debian-like app hosts
  ansible.builtin.command: "ufw allow {{ web_http_port | default(80) }}/tcp"
  changed_when: false
  when:
    - platform_family | default('debian') == 'debian'
    - "'glpi_app' in group_names"

- name: Allow HTTPS access on Debian-like app hosts
  ansible.builtin.command: "ufw allow {{ web_https_port | default(443) }}/tcp"
  changed_when: false
  when:
    - platform_family | default('debian') == 'debian'
    - "'glpi_app' in group_names"
    - glpi_tls_mode | default('none') != 'none'

- name: Close HTTPS access on Debian-like app hosts when TLS is disabled
  ansible.builtin.shell: |
    set -o pipefail
    if ufw status | grep -Fq "{{ web_https_port | default(443) }}/tcp"; then
      ufw --force delete allow {{ web_https_port | default(443) }}/tcp
      echo FIREWALL_RULE_REMOVED
    fi
  args:
    executable: /bin/bash
  register: glpi_ufw_https_disabled
  changed_when: "'FIREWALL_RULE_REMOVED' in (glpi_ufw_https_disabled.stdout | default(''))"
  when:
    - platform_family | default('debian') == 'debian'
    - "'glpi_app' in group_names"
    - glpi_tls_mode | default('none') == 'none'

- name: Ensure ufw is enabled on Debian-like hosts
  ansible.builtin.command: ufw --force enable
  changed_when: false
  when: platform_family | default('debian') == 'debian'

- name: Ensure firewalld is enabled on RHEL-like hosts
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  when: platform_family | default('debian') == 'rhel'

- name: Allow SSH access on RHEL-like hosts
  ansible.builtin.command: firewall-cmd --permanent --add-service=ssh
  changed_when: false
  when: platform_family | default('debian') == 'rhel'

- name: Remove legacy fixed HTTP service rule on RHEL-like app hosts
  ansible.builtin.shell: |
    if firewall-cmd --permanent --query-service=http >/dev/null 2>&1; then
      firewall-cmd --permanent --remove-service=http
      echo FIREWALL_RULE_REMOVED
    fi
  args:
    executable: /bin/bash
  register: glpi_firewalld_legacy_http_service
  changed_when: "'FIREWALL_RULE_REMOVED' in (glpi_firewalld_legacy_http_service.stdout | default(''))"
  when:
    - platform_family | default('debian') == 'rhel'
    - "'glpi_app' in group_names"

- name: Allow HTTP access on RHEL-like app hosts
  ansible.builtin.command: "firewall-cmd --permanent --add-port={{ web_http_port | default(80) }}/tcp"
  changed_when: false
  when:
    - platform_family | default('debian') == 'rhel'
    - "'glpi_app' in group_names"

- name: Remove legacy fixed HTTPS service rule on RHEL-like app hosts
  ansible.builtin.shell: |
    if firewall-cmd --permanent --query-service=https >/dev/null 2>&1; then
      firewall-cmd --permanent --remove-service=https
      echo FIREWALL_RULE_REMOVED
    fi
  args:
    executable: /bin/bash
  register: glpi_firewalld_legacy_https_service
  changed_when: "'FIREWALL_RULE_REMOVED' in (glpi_firewalld_legacy_https_service.stdout | default(''))"
  when:
    - platform_family | default('debian') == 'rhel'
    - "'glpi_app' in group_names"

- name: Allow HTTPS access on RHEL-like app hosts
  ansible.builtin.command: "firewall-cmd --permanent --add-port={{ web_https_port | default(443) }}/tcp"
  changed_when: false
  when:
    - platform_family | default('debian') == 'rhel'
    - "'glpi_app' in group_names"
    - glpi_tls_mode | default('none') != 'none'

- name: Close HTTPS access on RHEL-like app hosts when TLS is disabled
  ansible.builtin.shell: |
    if firewall-cmd --permanent --query-port={{ web_https_port | default(443) }}/tcp >/dev/null 2>&1; then
      firewall-cmd --permanent --remove-port={{ web_https_port | default(443) }}/tcp
      echo FIREWALL_RULE_REMOVED
    fi
  args:
    executable: /bin/bash
  register: glpi_firewalld_https_disabled
  changed_when: "'FIREWALL_RULE_REMOVED' in (glpi_firewalld_https_disabled.stdout | default(''))"
  when:
    - platform_family | default('debian') == 'rhel'
    - "'glpi_app' in group_names"
    - glpi_tls_mode | default('none') == 'none'

- name: Reload firewalld on RHEL-like hosts
  ansible.builtin.command: firewall-cmd --reload
  changed_when: false
  when: platform_family | default('debian') == 'rhel'
