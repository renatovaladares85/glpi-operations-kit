---
- name: Install MariaDB packages
  ansible.builtin.apt:
    name: "{{ mariadb_version_packages }}"
    state: present

- name: Deploy MariaDB tuning configuration
  ansible.builtin.template:
    src: 99-glpi.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/99-glpi.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart mariadb

- name: Ensure MariaDB is enabled
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

- name: Configure firewall for restricted MariaDB access
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
    port: "{{ mariadb_port }}"
    proto: tcp
  loop: "{{ db_firewall_sources | default(([glpi_db_app_access_host] if glpi_db_app_access_host is defined else db_allowed_source_hosts)) }}"
  when: not (db_firewall_open | default(false) | bool)

- name: Configure firewall for open MariaDB access
  community.general.ufw:
    rule: allow
    port: "{{ mariadb_port }}"
    proto: tcp
  when: db_firewall_open | default(false) | bool

- name: Check if runtime database secrets file is provided
  ansible.builtin.assert:
    that:
      - glpi_db_name is defined
      - glpi_db_user is defined
      - glpi_db_password is defined
      - glpi_db_root_password is defined
    fail_msg: "Missing critical database runtime secrets. Provide glpi_db_name, glpi_db_user, glpi_db_password and glpi_db_root_password."

- name: Wait for MariaDB local socket
  ansible.builtin.wait_for:
    path: /run/mysqld/mysqld.sock
    delay: 0
    timeout: 60

- name: Detect MariaDB admin authentication method
  block:
    - name: Probe MariaDB admin via unix socket
      community.mysql.mysql_query:
        query: "SELECT 1;"
        login_unix_socket: /run/mysqld/mysqld.sock
      changed_when: false

    - name: Use unix socket admin authentication
      ansible.builtin.set_fact:
        mariadb_admin_login_user: ""
        mariadb_admin_login_password: ""
        mariadb_admin_login_unix_socket: /run/mysqld/mysqld.sock
  rescue:
    - name: Probe MariaDB admin via root password and unix socket
      community.mysql.mysql_query:
        query: "SELECT 1;"
        login_user: root
        login_password: "{{ glpi_db_root_password }}"
        login_unix_socket: /run/mysqld/mysqld.sock
      changed_when: false

    - name: Use root password admin authentication
      ansible.builtin.set_fact:
        mariadb_admin_login_user: root
        mariadb_admin_login_password: "{{ glpi_db_root_password }}"
        mariadb_admin_login_unix_socket: /run/mysqld/mysqld.sock

- name: Configure MariaDB root password
  community.mysql.mysql_user:
    name: root
    host_all: true
    password: "{{ glpi_db_root_password }}"
    login_user: "{{ mariadb_admin_login_user | default(omit) }}"
    login_password: "{{ mariadb_admin_login_password | default(omit) }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket | default(omit) }}"
    check_implicit_admin: true
    state: present

- name: Standardize MariaDB admin login with root password
  ansible.builtin.set_fact:
    mariadb_admin_login_user: root
    mariadb_admin_login_password: "{{ glpi_db_root_password }}"
    mariadb_admin_login_unix_socket: /run/mysqld/mysqld.sock

- name: Remove anonymous MySQL users
  community.mysql.mysql_user:
    name: ""
    host_all: true
    state: absent
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"

- name: Remove test database
  community.mysql.mysql_db:
    name: test
    state: absent
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"

- name: Create GLPI database
  community.mysql.mysql_db:
    name: "{{ glpi_db_name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"

- name: Create GLPI database user
  community.mysql.mysql_user:
    name: "{{ glpi_db_user }}"
    password: "{{ glpi_db_password }}"
    host: "{{ db_grant_host | default(glpi_db_app_access_host | default('%')) }}"
    priv: "{{ glpi_db_name }}.*:ALL"
    state: present
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"

- name: Validate GLPI database user grant is present
  community.mysql.mysql_query:
    query: "SHOW GRANTS FOR '{{ glpi_db_user }}'@'{{ db_grant_host | default(glpi_db_app_access_host | default('%')) }}';"
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"
  changed_when: false

- name: Normalize GLPI timezone DB mode
  ansible.builtin.set_fact:
    glpi_timezone_db_mode_effective: "{{ glpi_timezone_db_mode | default('disabled') | string | lower }}"
  changed_when: false

- name: Assert valid GLPI timezone DB mode
  ansible.builtin.assert:
    that:
      - glpi_timezone_db_mode_effective in ['disabled', 'validate', 'apply']
    fail_msg: "Invalid glpi_timezone_db_mode. Supported values: disabled, validate, apply."
  changed_when: false

- name: Check timezone rows before timezone workflow
  community.mysql.mysql_query:
    query: "SELECT COUNT(*) AS tz_count FROM mysql.time_zone_name;"
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"
  register: mariadb_timezone_rows_before_result
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Read timezone row count before timezone workflow
  ansible.builtin.set_fact:
    mariadb_timezone_rows_before: "{{ ((mariadb_timezone_rows_before_result.query_result | default([]) | first | default([]) | first | default({})).tz_count | default(0)) | int }}"
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Load timezone tables into MariaDB from system zoneinfo
  ansible.builtin.shell: |
    set -euo pipefail
    tz_loader="$(command -v mariadb-tzinfo-to-sql || command -v mysql_tzinfo_to_sql || true)"
    if [[ -z "$tz_loader" ]]; then
      echo "Neither mariadb-tzinfo-to-sql nor mysql_tzinfo_to_sql was found." >&2
      exit 1
    fi
    "$tz_loader" /usr/share/zoneinfo | mysql --protocol=SOCKET --socket=/run/mysqld/mysqld.sock --user=root mysql
  args:
    executable: /bin/bash
  environment:
    MYSQL_PWD: "{{ glpi_db_root_password }}"
  no_log: true
  changed_when: true
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective == 'apply'
    - (mariadb_timezone_rows_before | default(0) | int) == 0

- name: Restart MariaDB after timezone tables load
  ansible.builtin.service:
    name: mariadb
    state: restarted
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective == 'apply'
    - (mariadb_timezone_rows_before | default(0) | int) == 0

- name: Optionally grant legacy timezone table read access for GLPI DB user
  community.mysql.mysql_query:
    query:
      - "GRANT SELECT ON mysql.time_zone_name TO '{{ glpi_db_user }}'@'{{ db_grant_host | default(glpi_db_app_access_host | default('%')) }}';"
      - "FLUSH PRIVILEGES;"
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"
  no_log: true
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_legacy_grant | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Check timezone rows after timezone workflow
  community.mysql.mysql_query:
    query: "SELECT COUNT(*) AS tz_count FROM mysql.time_zone_name;"
    login_user: "{{ mariadb_admin_login_user }}"
    login_password: "{{ mariadb_admin_login_password }}"
    login_unix_socket: "{{ mariadb_admin_login_unix_socket }}"
  register: mariadb_timezone_rows_after_result
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Read timezone row count after timezone workflow
  ansible.builtin.set_fact:
    mariadb_timezone_rows_after: "{{ ((mariadb_timezone_rows_after_result.query_result | default([]) | first | default([]) | first | default({})).tz_count | default(0)) | int }}"
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Assert timezone data is available when timezone DB mode is enabled
  ansible.builtin.assert:
    that:
      - (mariadb_timezone_rows_after | default(0) | int) > 0
    fail_msg: "Timezone data is not available in mysql.time_zone_name. Run timezone apply workflow or set GLPI_TIMEZONE_DB_MODE=disabled."
  changed_when: false
  when:
    - glpi_timezone_support_enabled | default(false) | bool
    - glpi_timezone_db_mode_effective in ['validate', 'apply']

- name: Check MariaDB configuration file permissions
  ansible.builtin.stat:
    path: /etc/mysql/mariadb.conf.d/99-glpi.cnf
  register: mariadb_cfg_stat
  changed_when: false

- name: Assert MariaDB configuration file permissions
  ansible.builtin.assert:
    that:
      - mariadb_cfg_stat.stat.exists
      - mariadb_cfg_stat.stat.pw_name == 'root'
      - mariadb_cfg_stat.stat.gr_name == 'root'
      - mariadb_cfg_stat.stat.mode == '0644'
    fail_msg: "MariaDB tuning file must be root:root with mode 0644."
  changed_when: false
