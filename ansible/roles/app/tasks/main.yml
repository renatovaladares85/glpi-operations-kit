---
- name: Install GLPI application packages
  ansible.builtin.apt:
    name: "{{ glpi_app_packages }}"
    state: present

- name: Create GLPI directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(glpi_data_owner) }}"
    group: "{{ item.group | default(glpi_data_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ glpi_config_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_plugin_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_log_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_backup_base_dir }}", owner: "root", group: "root", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_cache", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_cron", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_graphs", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_locales", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_lock", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_pictures", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_plugins", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_rss", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_sessions", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_tmp", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_uploads", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_inventories", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_themes", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }

- name: Assert valid TLS mode
  ansible.builtin.assert:
    that:
      - glpi_tls_mode in ['none', 'self_signed', 'provided']
    fail_msg: "Invalid glpi_tls_mode. Supported values: none, self_signed, provided."

- name: Assert valid web server type
  ansible.builtin.assert:
    that:
      - glpi_web_server_type in ['nginx', 'apache', 'lighttpd']
    fail_msg: "Invalid glpi_web_server_type. Supported values: nginx, apache, lighttpd."

- name: Assert provided TLS inputs exist
  ansible.builtin.assert:
    that:
      - glpi_tls_provided_local_cert_path | length > 0
      - glpi_tls_provided_local_key_path | length > 0
    fail_msg: "Provided TLS mode requires non-empty local certificate and key paths."
  when: glpi_tls_mode == 'provided'

- name: Copy provided TLS certificate
  ansible.builtin.copy:
    src: "{{ glpi_tls_provided_local_cert_path }}"
    dest: "{{ glpi_tls_certificate_path }}"
    owner: root
    group: root
    mode: "0644"
  when: glpi_tls_mode == 'provided'
  notify: Reload nginx

- name: Copy provided TLS private key
  ansible.builtin.copy:
    src: "{{ glpi_tls_provided_local_key_path }}"
    dest: "{{ glpi_tls_certificate_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: glpi_tls_mode == 'provided'
  notify: Reload nginx

- name: Generate self-signed TLS certificate
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:4096
      -keyout {{ glpi_tls_certificate_key_path }}
      -out {{ glpi_tls_certificate_path }}
      -days 365
      -subj /CN={{ glpi_tls_common_name }}
  args:
    creates: "{{ glpi_tls_certificate_path }}"
  when: glpi_tls_mode == 'self_signed'
  notify: Reload nginx

- name: Ensure self-signed TLS private key permissions
  ansible.builtin.file:
    path: "{{ glpi_tls_certificate_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: glpi_tls_mode == 'self_signed'

- name: Download GLPI archive
  ansible.builtin.get_url:
    url: "{{ glpi_download_url }}"
    dest: "/tmp/glpi-{{ glpi_version }}.tgz"
    mode: "0644"

- name: Unarchive GLPI release
  ansible.builtin.unarchive:
    src: "/tmp/glpi-{{ glpi_version }}.tgz"
    dest: "{{ glpi_release_root }}"
    remote_src: true
    creates: "{{ glpi_release_dir }}"

- name: Rename extracted GLPI directory when needed
  ansible.builtin.command:
    cmd: "mv {{ glpi_release_root }}/glpi {{ glpi_release_dir }}"
  args:
    creates: "{{ glpi_release_dir }}"
  when: not (glpi_release_dir == glpi_release_root ~ '/glpi')

- name: Create symlink for active GLPI release
  ansible.builtin.file:
    src: "{{ glpi_release_dir }}"
    dest: "{{ glpi_install_dir }}"
    state: link
    force: true

- name: Deploy GLPI downstream configuration
  ansible.builtin.template:
    src: downstream.php.j2
    dest: "{{ glpi_install_dir }}/inc/downstream.php"
    owner: root
    group: root
    mode: "0644"

- name: Deploy GLPI local_define configuration
  ansible.builtin.template:
    src: local_define.php.j2
    dest: "{{ glpi_config_dir }}/local_define.php"
    owner: "{{ glpi_data_owner }}"
    group: "{{ glpi_data_group }}"
    mode: "0640"

- name: Deploy php.ini overrides for GLPI
  ansible.builtin.template:
    src: glpi-php.ini.j2
    dest: /etc/php/8.3/fpm/conf.d/99-glpi.ini
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Deploy php.ini overrides for GLPI CLI
  ansible.builtin.template:
    src: glpi-php.ini.j2
    dest: /etc/php/8.3/cli/conf.d/99-glpi.ini
    owner: root
    group: root
    mode: "0644"

- name: Deploy PHP-FPM pool configuration
  ansible.builtin.template:
    src: glpi-pool.conf.j2
    dest: /etc/php/8.3/fpm/pool.d/glpi.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Disable default PHP-FPM pool to avoid socket conflicts
  ansible.builtin.file:
    path: /etc/php/8.3/fpm/pool.d/www.conf
    state: absent
  notify: Restart php-fpm

- name: Enable Apache rewrite module
  ansible.builtin.command: a2enmod rewrite
  register: apache_rewrite_module
  changed_when: "'already enabled' not in (apache_rewrite_module.stdout | default(''))"
  when: glpi_web_server_type == 'apache'
  notify: Reload apache2

- name: Deploy Nginx virtual host
  ansible.builtin.template:
    src: nginx-glpi.conf.j2
    dest: /etc/nginx/sites-available/glpi.conf
    owner: root
    group: root
    mode: "0644"
  when: glpi_web_server_type == 'nginx'
  notify: Reload nginx

- name: Enable GLPI virtual host
  ansible.builtin.file:
    src: /etc/nginx/sites-available/glpi.conf
    dest: /etc/nginx/sites-enabled/glpi.conf
    state: link
    force: true
  when: glpi_web_server_type == 'nginx'
  notify: Reload nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: glpi_web_server_type == 'nginx'
  notify: Reload nginx

- name: Remove default nginx site definition file when present
  ansible.builtin.file:
    path: /etc/nginx/sites-available/default
    state: absent
  when: glpi_web_server_type == 'nginx'
  notify: Reload nginx

- name: Deploy Apache virtual host
  ansible.builtin.template:
    src: apache-glpi.conf.j2
    dest: /etc/apache2/sites-available/glpi.conf
    owner: root
    group: root
    mode: "0644"
  when: glpi_web_server_type == 'apache'
  notify: Reload apache2

- name: Enable Apache GLPI virtual host
  ansible.builtin.command: a2ensite glpi.conf
  register: apache_glpi_site
  changed_when: "'already enabled' not in (apache_glpi_site.stdout | default(''))"
  when: glpi_web_server_type == 'apache'
  notify: Reload apache2

- name: Disable default Apache virtual host
  ansible.builtin.command: a2dissite 000-default.conf
  register: apache_default_site
  changed_when: "'already disabled' not in (apache_default_site.stdout | default(''))"
  when: glpi_web_server_type == 'apache'
  notify: Reload apache2

- name: Deploy lighttpd GLPI virtual host
  ansible.builtin.template:
    src: lighttpd-glpi.conf.j2
    dest: /etc/lighttpd/conf-available/glpi.conf
    owner: root
    group: root
    mode: "0644"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd GLPI virtual host
  ansible.builtin.command: lighty-enable-mod glpi
  register: lighttpd_enable_glpi
  changed_when: "'already enabled' not in (lighttpd_enable_glpi.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd rewrite module
  ansible.builtin.command: lighty-enable-mod rewrite
  register: lighttpd_enable_rewrite
  changed_when: "'already enabled' not in (lighttpd_enable_rewrite.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd fastcgi module
  ansible.builtin.command: lighty-enable-mod fastcgi
  register: lighttpd_enable_fastcgi
  changed_when: "'already enabled' not in (lighttpd_enable_fastcgi.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd fastcgi-php module
  ansible.builtin.command: lighty-enable-mod fastcgi-php
  register: lighttpd_enable_fastcgiphp
  changed_when: "'already enabled' not in (lighttpd_enable_fastcgiphp.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Deploy GLPI cron wrapper
  ansible.builtin.template:
    src: glpi-cron.sh.j2
    dest: /usr/local/bin/glpi-cron.sh
    owner: root
    group: root
    mode: "0750"

- name: Configure GLPI cron job
  ansible.builtin.cron:
    name: GLPI background tasks
    user: "{{ glpi_data_owner }}"
    job: "/usr/local/bin/glpi-cron.sh >> {{ glpi_log_dir }}/cron.log 2>&1"
    minute: "{{ glpi_cron_schedule.split(' ')[0] }}"
    hour: "{{ glpi_cron_schedule.split(' ')[1] }}"
    day: "{{ glpi_cron_schedule.split(' ')[2] }}"
    month: "{{ glpi_cron_schedule.split(' ')[3] }}"
    weekday: "{{ glpi_cron_schedule.split(' ')[4] }}"

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  when: glpi_web_server_type == 'nginx'

- name: Validate apache configuration
  ansible.builtin.command: apachectl -t
  changed_when: false
  when: glpi_web_server_type == 'apache'

- name: Validate lighttpd configuration
  ansible.builtin.command: lighttpd -tt -f /etc/lighttpd/lighttpd.conf
  changed_when: false
  when: glpi_web_server_type == 'lighttpd'

- name: Validate php-fpm configuration
  ansible.builtin.command: php-fpm8.3 -t
  changed_when: false

- name: Validate PHP bcmath extension for GLPI 11 baseline
  ansible.builtin.command: php -m
  register: glpi_php_modules
  changed_when: false

- name: Build mandatory PHP extension baseline for GLPI 11
  ansible.builtin.set_fact:
    glpi_required_php_extensions:
      - dom
      - fileinfo
      - filter
      - libxml
      - simplexml
      - tokenizer
      - xmlreader
      - xmlwriter
      - curl
      - gd
      - intl
      - mysqli
      - session
      - zlib
      - bcmath
      - mbstring
      - openssl
    glpi_php_modules_lower: "{{ (glpi_php_modules.stdout_lines | default([])) | map('lower') | list }}"
  changed_when: false

- name: Assert mandatory PHP extensions are available
  ansible.builtin.assert:
    that:
      - "(glpi_required_php_extensions | difference(glpi_php_modules_lower)) | length == 0"
    fail_msg: "Missing mandatory PHP extensions for GLPI 11: {{ glpi_required_php_extensions | difference(glpi_php_modules_lower) | join(', ') }}."
  changed_when: false

- name: Collect GLPI path permissions
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop:
    - { path: "{{ glpi_config_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_plugin_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_log_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_config_dir }}/local_define.php", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0640" }
    - { path: "/usr/local/bin/glpi-cron.sh", owner: "root", group: "root", mode: "0750" }
  register: glpi_permission_stats
  changed_when: false

- name: Assert GLPI path permissions baseline
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.pw_name == item.item.owner
      - item.stat.gr_name == item.item.group
      - item.stat.mode == item.item.mode
    fail_msg: "Permission baseline mismatch for {{ item.item.path }}. Expected {{ item.item.owner }}:{{ item.item.group }} mode {{ item.item.mode }}."
  loop: "{{ glpi_permission_stats.results }}"
  changed_when: false

- name: Check TLS private key permissions when TLS enabled
  ansible.builtin.stat:
    path: "{{ glpi_tls_certificate_key_path }}"
  register: glpi_tls_key_stat
  when: glpi_tls_mode != 'none'
  changed_when: false

- name: Assert TLS private key permissions when TLS enabled
  ansible.builtin.assert:
    that:
      - glpi_tls_key_stat.stat.exists
      - glpi_tls_key_stat.stat.pw_name == 'root'
      - glpi_tls_key_stat.stat.gr_name == 'root'
      - glpi_tls_key_stat.stat.mode == '0600'
    fail_msg: "TLS private key must be root:root with mode 0600."
  when: glpi_tls_mode != 'none'
  changed_when: false

- name: Ensure nginx is enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  when: glpi_web_server_type == 'nginx'

- name: Ensure apache2 is enabled
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
  when: glpi_web_server_type == 'apache'

- name: Ensure lighttpd is enabled
  ansible.builtin.service:
    name: lighttpd
    state: started
    enabled: true
  when: glpi_web_server_type == 'lighttpd'

- name: Ensure php-fpm is enabled
  ansible.builtin.service:
    name: "{{ glpi_php_fpm_service }}"
    state: started
    enabled: true

- name: Flush handlers before web routing checks
  ansible.builtin.meta: flush_handlers

- name: Check GLPI HTTP response by hostname header
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_http_port }}/"
    headers:
      Host: "{{ glpi_domain }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302]
    validate_certs: false
  register: glpi_http_hostname_check
  when: glpi_web_server_type == 'nginx'

- name: Check GLPI HTTP response by app IP header
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_http_port }}/"
    headers:
      Host: "{{ glpi_app_host }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302]
    validate_certs: false
  register: glpi_http_ip_check
  when: glpi_web_server_type == 'nginx'

- name: Assert nginx default page is not served for GLPI hostname
  ansible.builtin.assert:
    that:
      - "'Welcome to nginx!' not in (glpi_http_hostname_check.content | default(''))"
    fail_msg: "Nginx default page detected for GLPI hostname. GLPI vhost routing is not active."
  when: glpi_web_server_type == 'nginx'

- name: Assert nginx default page is not served for GLPI app IP
  ansible.builtin.assert:
    that:
      - "'Welcome to nginx!' not in (glpi_http_ip_check.content | default(''))"
    fail_msg: "Nginx default page detected for GLPI app IP. GLPI vhost routing is not active."
  when: glpi_web_server_type == 'nginx'

- name: Resolve web check base URL for selected engine
  ansible.builtin.set_fact:
    glpi_web_check_scheme: "{{ 'https' if glpi_tls_mode != 'none' else 'http' }}"
    glpi_web_check_port: "{{ web_https_port if glpi_tls_mode != 'none' else web_http_port }}"
    glpi_web_check_host_header: "{{ glpi_domain }}"
    glpi_web_check_base_url: "{{ ('https' if glpi_tls_mode != 'none' else 'http') ~ '://127.0.0.1:' ~ ((web_https_port if glpi_tls_mode != 'none' else web_http_port) | string) }}"

- name: Check GLPI root endpoint for selected engine
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303]
    validate_certs: false
  register: glpi_root_route_check
  changed_when: false

- name: Determine whether installer route must be reachable
  ansible.builtin.set_fact:
    glpi_install_route_expected: "{{ '/install/install.php' in (glpi_root_route_check.content | default('')) }}"
  changed_when: false

- name: Check GLPI installer compatibility route
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/install/install.php"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303]
    validate_certs: false
  register: glpi_install_route_check
  when: glpi_install_route_expected
  changed_when: false

- name: Assert installer route is not returning 404
  ansible.builtin.assert:
    that:
      - glpi_install_route_check.status in [200, 301, 302, 303]
    fail_msg: "Installer route '/install/install.php' failed. Verify web rewrite compatibility with public root."
  when: glpi_install_route_expected
  changed_when: false

- name: Extract sample JS/CSS assets from root page
  ansible.builtin.set_fact:
    glpi_asset_paths: >-
      {{
        (
          (glpi_root_route_check.content | default(''))
          | regex_findall('(?:src|href)=["''](/[^"''?#]+\\.(?:js|css))')
          | unique
          | list
        )[:3]
      }}
  changed_when: false

- name: Check representative static assets
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}{{ item }}"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: safe
    status_code: [200, 301, 302, 304]
    validate_certs: false
  loop: "{{ glpi_asset_paths }}"
  when: glpi_asset_paths | length > 0
  changed_when: false

- name: Ensure sensitive paths stay blocked
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/{{ item }}"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: none
    status_code: [403, 404]
    validate_certs: false
  loop:
    - config/config_db.php
    - files/_sessions/
    - vendor/autoload.php
  changed_when: false

- name: Ensure arbitrary PHP path is handled by router without server error
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/should-not-exist.php"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: safe
    status_code: [200, 301, 302, 303, 404]
    validate_certs: false
  changed_when: false

- name: Validate PHP timezone default when timezone support is enabled
  ansible.builtin.command: php -r 'echo date_default_timezone_get();'
  register: glpi_php_timezone_default
  changed_when: false
  when: glpi_timezone_support_enabled | default(false) | bool

- name: Assert PHP timezone matches OPERATIONS_TIMEZONE when timezone support is enabled
  ansible.builtin.assert:
    that:
      - (glpi_php_timezone_default.stdout | trim) == timezone_name
    fail_msg: "PHP timezone mismatch. Expected '{{ timezone_name }}' but got '{{ glpi_php_timezone_default.stdout | trim }}'."
  changed_when: false
  when: glpi_timezone_support_enabled | default(false) | bool

- name: Validate APP to DB connectivity using GLPI DB user
  ansible.builtin.command: >-
    mysql --protocol=TCP
    --host={{ glpi_db_host }}
    --port={{ mariadb_port }}
    --user={{ glpi_db_user }}
    --execute=SELECT 1;
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_app_db_connectivity
  changed_when: false
  no_log: true
  when: (database_deployment_mode | default('self_hosted')) != 'managed'
