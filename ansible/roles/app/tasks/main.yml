---
- name: Install GLPI application packages
  ansible.builtin.package:
    name: "{{ glpi_app_packages }}"
    state: present

- name: Create GLPI directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(glpi_data_owner) }}"
    group: "{{ item.group | default(glpi_data_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ glpi_config_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_plugin_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_log_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_backup_base_dir }}", owner: "root", group: "root", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_cache", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_cron", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_graphs", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_locales", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_lock", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_pictures", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_plugins", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_rss", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_sessions", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_tmp", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_uploads", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_inventories", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}/_themes", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }

- name: Assert valid TLS mode
  ansible.builtin.assert:
    that:
      - glpi_tls_mode in ['none', 'self_signed', 'provided']
    fail_msg: "Invalid glpi_tls_mode. Supported values: none, self_signed, provided."

- name: Assert valid web server type
  ansible.builtin.assert:
    that:
      - glpi_web_server_type in ['nginx', 'apache', 'lighttpd']
    fail_msg: "Invalid glpi_web_server_type. Supported values: nginx, apache, lighttpd."

- name: Resolve GLPI installation mode
  ansible.builtin.set_fact:
    glpi_installation_mode_effective: "{{ glpi_installation_mode | default('cli') | string | lower }}"
    glpi_wizard_reset_config_db_effective: "{{ glpi_wizard_reset_config_db | default(false) | bool }}"
  changed_when: false

- name: Assert valid GLPI installation mode
  ansible.builtin.assert:
    that:
      - glpi_installation_mode_effective in ['cli', 'wizard', 'defer']
    fail_msg: "Invalid GLPI installation mode. Supported values: cli, wizard, defer."
  changed_when: false

- name: Assert provided TLS inputs exist
  ansible.builtin.assert:
    that:
      - glpi_tls_provided_local_cert_path | length > 0
      - glpi_tls_provided_local_key_path | length > 0
    fail_msg: "Provided TLS mode requires non-empty local certificate and key paths."
  when: glpi_tls_mode == 'provided'

- name: Ensure TLS target directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ glpi_tls_certificate_path | dirname }}"
    - "{{ glpi_tls_certificate_key_path | dirname }}"
  when: glpi_tls_mode != 'none'

- name: Copy provided TLS certificate
  ansible.builtin.copy:
    src: "{{ glpi_tls_provided_local_cert_path }}"
    dest: "{{ glpi_tls_certificate_path }}"
    owner: root
    group: root
    mode: "0644"
  when: glpi_tls_mode == 'provided'
  notify: Reload selected web server

- name: Copy provided TLS private key
  ansible.builtin.copy:
    src: "{{ glpi_tls_provided_local_key_path }}"
    dest: "{{ glpi_tls_certificate_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: glpi_tls_mode == 'provided'
  notify: Reload selected web server

- name: Assert self-signed TLS identity is a DNS name
  ansible.builtin.assert:
    that:
      - glpi_tls_common_name | length > 0
      - glpi_tls_san_dns | default([]) | length > 0
      - glpi_tls_common_name is match('^(?=.{1,253}$)(?:[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?\\.)*[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?$')
    fail_msg: "TLS_COMMON_NAME must be a valid DNS hostname when TLS_MODE=self_signed. IP addresses are not added to SAN automatically."
  when: glpi_tls_mode == 'self_signed'

- name: Validate or generate self-signed TLS certificate
  ansible.builtin.shell: |
    set -euo pipefail
    cert={{ glpi_tls_certificate_path | quote }}
    key={{ glpi_tls_certificate_key_path | quote }}
    common_name={{ glpi_tls_common_name | quote }}
    expected_csv={{ (glpi_tls_san_dns | default([glpi_tls_common_name]) | sort | join(',')) | quote }}
    valid=true

    if [[ ! -r "$cert" || ! -r "$key" ]]; then
      valid=false
    elif ! openssl x509 -in "$cert" -noout -checkend 0 >/dev/null 2>&1; then
      valid=false
    elif ! openssl x509 -in "$cert" -noout -subject -nameopt RFC2253 2>/dev/null | grep -Fq "CN=${common_name}"; then
      valid=false
    else
      cert_pub="$(openssl x509 -in "$cert" -pubkey -noout 2>/dev/null | openssl pkey -pubin -outform DER 2>/dev/null | openssl sha256)"
      key_pub="$(openssl pkey -in "$key" -pubout -outform DER 2>/dev/null | openssl sha256)"
      actual_csv="$(openssl x509 -in "$cert" -noout -ext subjectAltName 2>/dev/null | grep -o 'DNS:[^, ]*' | cut -d: -f2- | tr '[:upper:]' '[:lower:]' | sort -u | paste -sd, -)"
      if [[ -z "$cert_pub" || "$cert_pub" != "$key_pub" || "$actual_csv" != "$expected_csv" ]]; then
        valid=false
      elif ! openssl x509 -in "$cert" -noout -ext extendedKeyUsage 2>/dev/null | grep -Fq 'TLS Web Server Authentication'; then
        valid=false
      fi
    fi

    if [[ "$valid" == true ]]; then
      echo CERTIFICATE_UNCHANGED
      exit 0
    fi

    tmpdir="$(mktemp -d)"
    trap 'rm -rf "$tmpdir"' EXIT
    san_ext="$(printf '%s' "$expected_csv" | awk -F, '{for (i=1; i<=NF; i++) printf "%sDNS:%s", (i > 1 ? "," : ""), $i}')"
    openssl req -x509 -nodes -newkey rsa:4096 \
      -keyout "$tmpdir/tls.key" \
      -out "$tmpdir/tls.crt" \
      -days 365 \
      -subj "/CN=${common_name}" \
      -addext "subjectAltName=${san_ext}" \
      -addext "extendedKeyUsage=serverAuth"
    openssl x509 -in "$tmpdir/tls.crt" -noout -checkend 0 >/dev/null
    test "$(openssl x509 -in "$tmpdir/tls.crt" -pubkey -noout | openssl pkey -pubin -outform DER | openssl sha256)" = \
      "$(openssl pkey -in "$tmpdir/tls.key" -pubout -outform DER | openssl sha256)"

    timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
    [[ ! -e "$cert" ]] || cp -a "$cert" "${cert}.bak.${timestamp}"
    [[ ! -e "$key" ]] || cp -a "$key" "${key}.bak.${timestamp}"
    install -o root -g root -m 0644 "$tmpdir/tls.crt" "$cert"
    install -o root -g root -m 0600 "$tmpdir/tls.key" "$key"
    echo CERTIFICATE_GENERATED
  args:
    executable: /bin/bash
  register: glpi_self_signed_certificate
  changed_when: "'CERTIFICATE_GENERATED' in (glpi_self_signed_certificate.stdout | default(''))"
  when: glpi_tls_mode == 'self_signed'
  notify: Reload selected web server

- name: Validate provided TLS certificate and private key match
  ansible.builtin.shell: |
    set -euo pipefail
    cert_pub="$(openssl x509 -in {{ glpi_tls_certificate_path | quote }} -pubkey -noout | openssl pkey -pubin -outform DER | openssl sha256)"
    key_pub="$(openssl pkey -in {{ glpi_tls_certificate_key_path | quote }} -pubout -outform DER | openssl sha256)"
    test "$cert_pub" = "$key_pub"
    openssl x509 -in {{ glpi_tls_certificate_path | quote }} -noout -checkend 0 >/dev/null
  args:
    executable: /bin/bash
  changed_when: false
  when: glpi_tls_mode == 'provided'

- name: Ensure self-signed TLS private key permissions
  ansible.builtin.file:
    path: "{{ glpi_tls_certificate_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: glpi_tls_mode == 'self_signed'

- name: Ensure TLS certificate permissions
  ansible.builtin.file:
    path: "{{ glpi_tls_certificate_path }}"
    owner: root
    group: root
    mode: "0644"
  when: glpi_tls_mode != 'none'

- name: Validate TLS certificate covers GLPI domain
  ansible.builtin.shell: |
    set -o pipefail
    openssl x509 -in {{ glpi_tls_certificate_path | quote }} -noout -checkhost {{ glpi_domain | quote }} |
      grep -Fq 'does match certificate'
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - glpi_tls_mode != 'none'
    - glpi_web_server_type in ['apache', 'nginx']

- name: Download GLPI archive
  ansible.builtin.get_url:
    url: "{{ glpi_download_url }}"
    dest: "/tmp/glpi-{{ glpi_version }}.tgz"
    mode: "0644"

- name: Unarchive GLPI release
  ansible.builtin.unarchive:
    src: "/tmp/glpi-{{ glpi_version }}.tgz"
    dest: "{{ glpi_release_root }}"
    remote_src: true
    creates: "{{ glpi_release_dir }}"

- name: Rename extracted GLPI directory when needed
  ansible.builtin.command:
    cmd: "mv {{ glpi_release_root }}/glpi {{ glpi_release_dir }}"
  args:
    creates: "{{ glpi_release_dir }}"
  when: not (glpi_release_dir == glpi_release_root ~ '/glpi')

- name: Create symlink for active GLPI release
  ansible.builtin.file:
    src: "{{ glpi_release_dir }}"
    dest: "{{ glpi_install_dir }}"
    state: link
    force: true

- name: Deploy GLPI downstream configuration
  ansible.builtin.template:
    src: downstream.php.j2
    dest: "{{ glpi_install_dir }}/inc/downstream.php"
    owner: root
    group: root
    mode: "0644"

- name: Deploy GLPI local_define configuration
  ansible.builtin.template:
    src: local_define.php.j2
    dest: "{{ glpi_config_dir }}/local_define.php"
    owner: "{{ glpi_data_owner }}"
    group: "{{ glpi_data_group }}"
    mode: "0640"

- name: Deploy GLPI database configuration
  ansible.builtin.template:
    src: config_db.php.j2
    dest: "{{ glpi_config_dir }}/config_db.php"
    owner: "{{ glpi_data_owner }}"
    group: "{{ glpi_data_group }}"
    mode: "0640"
  no_log: true
  when: glpi_installation_mode_effective != 'wizard'

- name: Deploy php.ini overrides for GLPI
  ansible.builtin.template:
    src: glpi-php.ini.j2
    dest: "{{ glpi_php_ini_fpm_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Deploy php.ini overrides for GLPI CLI
  ansible.builtin.template:
    src: glpi-php.ini.j2
    dest: "{{ glpi_php_ini_cli_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Deploy PHP-FPM pool configuration
  ansible.builtin.template:
    src: glpi-pool.conf.j2
    dest: "{{ glpi_php_fpm_pool_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Disable default PHP-FPM pool to avoid socket conflicts
  ansible.builtin.file:
    path: "{{ glpi_php_fpm_default_pool_path }}"
    state: absent
  notify: Restart php-fpm

- name: Enable Apache modules on Debian-like hosts
  ansible.builtin.command: >-
    a2enmod rewrite proxy proxy_fcgi setenvif{% if glpi_tls_mode != 'none' %} ssl{% endif %}
  register: apache_rewrite_module
  changed_when: "'already enabled' not in (apache_rewrite_module.stdout | default(''))"
  when:
    - glpi_web_server_type == 'apache'
    - platform_family | default('debian') == 'debian'
  notify: Reload apache2

- name: Check Rocky default SSL virtual host
  ansible.builtin.stat:
    path: "{{ glpi_apache_ssl_default_conf_path }}"
  register: glpi_apache_ssl_default_conf
  changed_when: false
  when:
    - glpi_web_server_type == 'apache'
    - glpi_tls_mode != 'none'
    - platform_family | default('debian') == 'rhel'
    - glpi_apache_ssl_default_conf_path | length > 0

- name: Back up Rocky default SSL virtual host before disabling it
  ansible.builtin.copy:
    src: "{{ glpi_apache_ssl_default_conf_path }}"
    dest: "{{ glpi_apache_ssl_default_conf_path }}.glpi-disabled"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
    backup: true
  when:
    - glpi_web_server_type == 'apache'
    - glpi_tls_mode != 'none'
    - platform_family | default('debian') == 'rhel'
    - glpi_apache_ssl_default_conf_path | length > 0
    - glpi_apache_ssl_default_conf.stat.exists | default(false)

- name: Disable Rocky default SSL virtual host
  ansible.builtin.file:
    path: "{{ glpi_apache_ssl_default_conf_path }}"
    state: absent
  when:
    - glpi_web_server_type == 'apache'
    - glpi_tls_mode != 'none'
    - platform_family | default('debian') == 'rhel'
    - glpi_apache_ssl_default_conf_path | length > 0
  notify: Reload apache2

- name: Deploy Nginx virtual host
  ansible.builtin.template:
    src: nginx-glpi.conf.j2
    dest: "{{ glpi_nginx_conf_available_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: glpi_web_server_type == 'nginx'
  notify: Reload nginx

- name: Enable GLPI virtual host
  ansible.builtin.file:
    src: "{{ glpi_nginx_conf_available_path }}"
    dest: "{{ glpi_nginx_conf_enabled_path }}"
    state: link
    force: true
  when:
    - glpi_web_server_type == 'nginx'
    - glpi_nginx_conf_enabled_path != glpi_nginx_conf_available_path
  notify: Reload nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: "{{ glpi_nginx_default_enabled_path }}"
    state: absent
  when:
    - glpi_web_server_type == 'nginx'
    - glpi_nginx_default_enabled_path | length > 0
  notify: Reload nginx

- name: Remove default nginx site definition file when present
  ansible.builtin.file:
    path: "{{ glpi_nginx_default_available_path }}"
    state: absent
  when:
    - glpi_web_server_type == 'nginx'
    - glpi_nginx_default_available_path | length > 0
  notify: Reload nginx

- name: Deploy Apache virtual host
  ansible.builtin.template:
    src: apache-glpi.conf.j2
    dest: "{{ glpi_apache_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: glpi_web_server_type == 'apache'
  notify: Reload apache2

- name: Enable Apache GLPI virtual host on Debian-like hosts
  ansible.builtin.command: a2ensite glpi.conf
  register: apache_glpi_site
  changed_when: "'already enabled' not in (apache_glpi_site.stdout | default(''))"
  when:
    - glpi_web_server_type == 'apache'
    - platform_family | default('debian') == 'debian'
  notify: Reload apache2

- name: Disable default Apache virtual host on Debian-like hosts
  ansible.builtin.command: a2dissite 000-default.conf
  register: apache_default_site
  changed_when: "'already disabled' not in (apache_default_site.stdout | default(''))"
  when:
    - glpi_web_server_type == 'apache'
    - platform_family | default('debian') == 'debian'
  notify: Reload apache2

- name: Disable default Apache welcome page on RHEL-like hosts
  ansible.builtin.file:
    path: "{{ glpi_apache_default_conf_path }}"
    state: absent
  when:
    - glpi_web_server_type == 'apache'
    - platform_family | default('debian') == 'rhel'
  notify: Reload apache2

- name: Deploy lighttpd GLPI virtual host
  ansible.builtin.template:
    src: lighttpd-glpi.conf.j2
    dest: /etc/lighttpd/conf-available/glpi.conf
    owner: root
    group: root
    mode: "0644"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd GLPI virtual host
  ansible.builtin.command: lighty-enable-mod glpi
  register: lighttpd_enable_glpi
  changed_when: "'already enabled' not in (lighttpd_enable_glpi.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd rewrite module
  ansible.builtin.command: lighty-enable-mod rewrite
  register: lighttpd_enable_rewrite
  changed_when: "'already enabled' not in (lighttpd_enable_rewrite.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd fastcgi module
  ansible.builtin.command: lighty-enable-mod fastcgi
  register: lighttpd_enable_fastcgi
  changed_when: "'already enabled' not in (lighttpd_enable_fastcgi.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Enable lighttpd fastcgi-php module
  ansible.builtin.command: lighty-enable-mod fastcgi-php
  register: lighttpd_enable_fastcgiphp
  changed_when: "'already enabled' not in (lighttpd_enable_fastcgiphp.stdout | default(''))"
  when: glpi_web_server_type == 'lighttpd'
  notify: Reload lighttpd

- name: Deploy GLPI Redis integration script
  ansible.builtin.copy:
    src: glpi-redis-integration.sh
    dest: /usr/local/sbin/glpi-redis-integration.sh
    owner: root
    group: root
    mode: "0750"
    backup: true

- name: Deploy GLPI Redis session rollback script
  ansible.builtin.copy:
    src: glpi-redis-session-rollback.sh
    dest: /usr/local/sbin/glpi-redis-session-rollback.sh
    owner: root
    group: root
    mode: "0750"
    backup: true

- name: Deploy GLPI cron wrapper
  ansible.builtin.template:
    src: glpi-cron.sh.j2
    dest: /usr/local/bin/glpi-cron.sh
    owner: root
    group: root
    mode: "0750"

- name: Read existing GLPI user crontab before cron migration
  ansible.builtin.command: "crontab -u {{ glpi_data_owner }} -l"
  register: glpi_legacy_user_crontab
  failed_when: false
  changed_when: false

- name: Backup legacy GLPI user crontab before removal
  ansible.builtin.copy:
    content: "{{ glpi_legacy_user_crontab.stdout }}\n"
    dest: "/tmp/glpi_user_crontab_{{ glpi_data_owner }}_{{ ansible_date_time.iso8601_basic_short }}.bak"
    owner: root
    group: root
    mode: "0600"
  when:
    - glpi_legacy_user_crontab.rc == 0
    - "'/usr/local/bin/glpi-cron.sh' in (glpi_legacy_user_crontab.stdout | default(''))"

- name: Remove legacy GLPI user crontab entry
  ansible.builtin.cron:
    name: GLPI background tasks
    user: "{{ glpi_data_owner }}"
    state: absent

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  when: glpi_web_server_type == 'nginx'

- name: Validate apache configuration
  ansible.builtin.command: apachectl -t
  changed_when: false
  when: glpi_web_server_type == 'apache'

- name: Validate lighttpd configuration
  ansible.builtin.command: lighttpd -tt -f /etc/lighttpd/lighttpd.conf
  changed_when: false
  when: glpi_web_server_type == 'lighttpd'

- name: Validate php-fpm configuration
  ansible.builtin.command: "{{ glpi_php_fpm_test_command }}"
  changed_when: false

- name: Validate PHP bcmath extension for GLPI 11 baseline
  ansible.builtin.command: php -m
  register: glpi_php_modules
  changed_when: false

- name: Build mandatory PHP extension baseline for GLPI 11
  ansible.builtin.set_fact:
    glpi_required_php_extensions:
      - dom
      - fileinfo
      - filter
      - libxml
      - simplexml
      - tokenizer
      - xmlreader
      - xmlwriter
      - curl
      - gd
      - intl
      - mysqli
      - session
      - zlib
      - bcmath
      - mbstring
      - openssl
    glpi_php_modules_lower: "{{ (glpi_php_modules.stdout_lines | default([])) | map('lower') | list }}"
  changed_when: false

- name: Assert mandatory PHP extensions are available
  ansible.builtin.assert:
    that:
      - "(glpi_required_php_extensions | difference(glpi_php_modules_lower)) | length == 0"
    fail_msg: "Missing mandatory PHP extensions for GLPI 11: {{ glpi_required_php_extensions | difference(glpi_php_modules_lower) | join(', ') }}."
  changed_when: false

- name: Collect GLPI path permissions
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop:
    - { path: "{{ glpi_config_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_var_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_plugin_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_log_dir }}", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0750" }
    - { path: "{{ glpi_config_dir }}/local_define.php", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0640" }
    - { path: "{{ glpi_config_dir }}/config_db.php", owner: "{{ glpi_data_owner }}", group: "{{ glpi_data_group }}", mode: "0640" }
    - { path: "/usr/local/bin/glpi-cron.sh", owner: "root", group: "root", mode: "0750" }
    - { path: "/usr/local/sbin/glpi-redis-integration.sh", owner: "root", group: "root", mode: "0750" }
    - { path: "/usr/local/sbin/glpi-redis-session-rollback.sh", owner: "root", group: "root", mode: "0750" }
  register: glpi_permission_stats
  changed_when: false

- name: Assert GLPI path permissions baseline
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.pw_name == item.item.owner
      - item.stat.gr_name == item.item.group
      - item.stat.mode == item.item.mode
    fail_msg: "Permission baseline mismatch for {{ item.item.path }}. Expected {{ item.item.owner }}:{{ item.item.group }} mode {{ item.item.mode }}."
  loop: "{{ glpi_permission_stats.results }}"
  when: not (glpi_installation_mode_effective == 'wizard' and item.item.path == glpi_config_dir ~ '/config_db.php')
  changed_when: false

- name: Check TLS private key permissions when TLS enabled
  ansible.builtin.stat:
    path: "{{ glpi_tls_certificate_key_path }}"
  register: glpi_tls_key_stat
  when: glpi_tls_mode != 'none'
  changed_when: false

- name: Assert TLS private key permissions when TLS enabled
  ansible.builtin.assert:
    that:
      - glpi_tls_key_stat.stat.exists
      - glpi_tls_key_stat.stat.pw_name == 'root'
      - glpi_tls_key_stat.stat.gr_name == 'root'
      - glpi_tls_key_stat.stat.mode == '0600'
    fail_msg: "TLS private key must be root:root with mode 0600."
  when: glpi_tls_mode != 'none'
  changed_when: false

- name: Ensure nginx is enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  when: glpi_web_server_type == 'nginx'

- name: Ensure apache2 is enabled
  ansible.builtin.service:
    name: "{{ glpi_apache_service }}"
    state: started
    enabled: true
  when: glpi_web_server_type == 'apache'

- name: Ensure lighttpd is enabled
  ansible.builtin.service:
    name: lighttpd
    state: started
    enabled: true
  when: glpi_web_server_type == 'lighttpd'

- name: Ensure php-fpm is enabled
  ansible.builtin.service:
    name: "{{ glpi_php_fpm_service }}"
    state: started
    enabled: true

- name: Flush handlers before web routing checks
  ansible.builtin.meta: flush_handlers

- name: Resolve GLPI schema bootstrap controls
  ansible.builtin.set_fact:
    database_compatibility_policy_effective: "{{ database_compatibility_policy | default('block') | string | lower }}"
    database_compatibility_operator_confirmed_effective: "{{ database_compatibility_operator_confirmed | default(false) | bool }}"
    database_compatibility_schema_bootstrap_deferred_effective: "{{ database_compatibility_schema_bootstrap_deferred | default(false) | bool }}"
    glpi_schema_bootstrap_deferred_effective: >-
      {{
        (database_compatibility_schema_bootstrap_deferred | default(false) | bool)
        or
        glpi_installation_mode_effective in ['wizard', 'defer']
      }}
  changed_when: false

- name: Check existing GLPI database configuration for wizard mode
  ansible.builtin.stat:
    path: "{{ glpi_config_dir }}/config_db.php"
  register: glpi_wizard_config_db_stat
  changed_when: false
  when: glpi_installation_mode_effective == 'wizard'

- name: Inspect GLPI schema marker when wizard config already exists
  ansible.builtin.command:
    argv:
      - mysql
      - --protocol=TCP
      - "--host={{ glpi_db_host }}"
      - "--port={{ mariadb_port }}"
      - "--user={{ glpi_db_user }}"
      - "--database={{ glpi_db_name }}"
      - --batch
      - --skip-column-names
      - --connect-timeout=10
      - "--execute=SHOW TABLES LIKE 'glpi_configs';"
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_wizard_existing_schema_marker
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_stat.stat.exists | default(false)

- name: Refuse wizard mode with existing database config unless reset is explicit
  ansible.builtin.assert:
    that:
      - glpi_wizard_reset_config_db_effective | bool
    fail_msg: >-
      GLPI_INSTALLATION_MODE=wizard requires {{ glpi_config_dir }}/config_db.php to be absent.
      Existing config_db.php makes GLPI bypass the web wizard and can return HTTP 500 when the
      database schema is empty. Schema probe status={{ glpi_wizard_existing_schema_marker.rc | default('not-run') }},
      marker='{{ glpi_wizard_existing_schema_marker.stdout | default('') | trim }}'.
      If this is a new non-production install, set GLPI_WIZARD_RESET_CONFIG_DB=true to move the
      active file to a timestamped backup. If GLPI is already installed, use GLPI_INSTALLATION_MODE=cli.
  changed_when: false
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_stat.stat.exists | default(false)
    - not (glpi_wizard_reset_config_db_effective | bool)

- name: Assert wizard config reset is restricted to non-production
  ansible.builtin.assert:
    that:
      - (environment_stage | default(environment_name | default('')) | string | lower) not in ['prod', 'production', 'prd']
    fail_msg: "GLPI_WIZARD_RESET_CONFIG_DB=true is refused in production-like stages."
  changed_when: false
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_stat.stat.exists | default(false)
    - glpi_wizard_reset_config_db_effective | bool

- name: Assert wizard config reset only targets empty GLPI schema
  ansible.builtin.assert:
    that:
      - glpi_wizard_existing_schema_marker.rc == 0
      - (glpi_wizard_existing_schema_marker.stdout | default('') | trim) == ''
    fail_msg: >-
      Refusing to reset {{ glpi_config_dir }}/config_db.php because the configured database
      could not be confirmed empty. Validate the database manually before moving config_db.php.
  changed_when: false
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_stat.stat.exists | default(false)
    - glpi_wizard_reset_config_db_effective | bool

- name: Move existing GLPI database config aside for wizard mode
  ansible.builtin.command:
    argv:
      - mv
      - "{{ glpi_config_dir }}/config_db.php"
      - "{{ glpi_config_dir }}/config_db.php.bak.{{ ansible_date_time.iso8601_basic_short }}"
  register: glpi_wizard_config_db_backup
  changed_when: glpi_wizard_config_db_backup.rc == 0
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_stat.stat.exists | default(false)
    - glpi_wizard_reset_config_db_effective | bool

- name: Report wizard config reset backup path
  ansible.builtin.debug:
    msg: "Moved existing GLPI config_db.php to {{ glpi_config_dir }}/config_db.php.bak.{{ ansible_date_time.iso8601_basic_short }} to allow the web install wizard."
  when:
    - glpi_installation_mode_effective == 'wizard'
    - glpi_wizard_config_db_backup is defined
    - glpi_wizard_config_db_backup is changed

- name: Check GLPI database server version
  ansible.builtin.command:
    argv:
      - mysql
      - --protocol=TCP
      - "--host={{ glpi_db_host }}"
      - "--port={{ mariadb_port }}"
      - "--user={{ glpi_db_user }}"
      - "--database={{ glpi_db_name }}"
      - --batch
      - --skip-column-names
      - --connect-timeout=10
      - "--execute=SELECT VERSION(), @@version_comment;"
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_db_server_version_probe
  changed_when: false
  failed_when: false
  no_log: true
  when: glpi_installation_mode_effective != 'wizard'

- name: Assert GLPI database server version can be inspected
  ansible.builtin.assert:
    that:
      - glpi_db_server_version_probe.rc == 0
    fail_msg: "GLPI database version could not be inspected with configured application credentials. Validate managed DB host, port, database, user, password and grants."
  changed_when: false
  when: glpi_installation_mode_effective != 'wizard'

- name: Resolve GLPI database compatibility facts
  ansible.builtin.set_fact:
    glpi_major_version_effective: "{{ (glpi_version | string).split('.')[0] | int }}"
    glpi_db_server_version_output: "{{ glpi_db_server_version_probe.stdout | default('') | trim }}"
    glpi_db_server_version_number: "{{ (glpi_db_server_version_probe.stdout | default('') | regex_search('[0-9]+\\.[0-9]+(\\.[0-9]+)?')) | default('0.0.0', true) }}"
    glpi_db_server_engine: "{{ 'mariadb' if ('mariadb' in (glpi_db_server_version_probe.stdout | default('') | lower)) else 'mysql' }}"
  changed_when: false
  when: glpi_installation_mode_effective != 'wizard'

- name: Resolve GLPI database compatibility policy
  ansible.builtin.set_fact:
    database_compatibility_policy_effective: "{{ database_compatibility_policy | default('block') | string | lower }}"
    database_compatibility_operator_confirmed_effective: "{{ database_compatibility_operator_confirmed | default(false) | bool }}"
    database_compatibility_schema_bootstrap_deferred_effective: "{{ database_compatibility_schema_bootstrap_deferred | default(false) | bool }}"
    glpi_db_required_minimum: >-
      {{
        'MariaDB >= 10.6 or MySQL >= 8.0 for GLPI 11'
        if (glpi_major_version_effective | int) >= 11
        else
        'MariaDB >= 10.2 or MySQL >= 5.7 for GLPI 10'
      }}
    glpi_db_server_version_supported: >-
      {{
        (
          (glpi_major_version_effective | int) >= 11
          and
          (
            (
              glpi_db_server_engine == 'mariadb'
              and
              (glpi_db_server_version_number is version('10.6', '>='))
            )
            or
            (
              glpi_db_server_engine == 'mysql'
              and
              (glpi_db_server_version_number is version('8.0', '>='))
            )
          )
        )
        or
        (
          (glpi_major_version_effective | int) == 10
          and
          (
            (
              glpi_db_server_engine == 'mariadb'
              and
              (glpi_db_server_version_number is version('10.2', '>='))
            )
            or
            (
              glpi_db_server_engine == 'mysql'
              and
              (glpi_db_server_version_number is version('5.7', '>='))
            )
          )
        )
      }}
  changed_when: false
  when: glpi_installation_mode_effective != 'wizard'

- name: Assert GLPI database server version is supported
  ansible.builtin.assert:
    that:
      - >-
        (glpi_db_server_version_supported | bool)
        or
        (
          database_compatibility_policy_effective in ['warn', 'defer']
          and
          (database_compatibility_operator_confirmed_effective | bool)
        )
    fail_msg: "Unsupported database server for GLPI {{ glpi_version }}: detected {{ glpi_db_server_version_output }}. Required: {{ glpi_db_required_minimum }}. Use DATABASE_COMPATIBILITY_POLICY=warn|defer only through glpictl confirmation, never as a silent Ansible bypass."
  changed_when: false
  when: glpi_installation_mode_effective != 'wizard'

- name: Warn about unsupported managed database accepted by policy
  ansible.builtin.debug:
    msg: "Unsupported database server for GLPI {{ glpi_version }} accepted under DATABASE_COMPATIBILITY_POLICY={{ database_compatibility_policy_effective }}. Detected {{ glpi_db_server_engine }} {{ glpi_db_server_version_number }}; required {{ glpi_db_required_minimum }}. Schema bootstrap deferred={{ database_compatibility_schema_bootstrap_deferred_effective }}."
  when:
    - glpi_installation_mode_effective != 'wizard'
    - not (glpi_db_server_version_supported | bool)
    - database_compatibility_policy_effective in ['warn', 'defer']
    - database_compatibility_operator_confirmed_effective | bool

- name: Check GLPI database schema marker
  ansible.builtin.command:
    argv:
      - mysql
      - --protocol=TCP
      - "--host={{ glpi_db_host }}"
      - "--port={{ mariadb_port }}"
      - "--user={{ glpi_db_user }}"
      - "--database={{ glpi_db_name }}"
      - --batch
      - --skip-column-names
      - --connect-timeout=10
      - "--execute=SHOW TABLES LIKE 'glpi_configs';"
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_db_schema_marker
  changed_when: false
  failed_when: false
  no_log: true
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Assert GLPI database is reachable before schema bootstrap
  ansible.builtin.assert:
    that:
      - glpi_db_schema_marker.rc == 0
    fail_msg: "GLPI database is not reachable with configured application credentials. Validate managed DB host, port, database, user, password and grants."
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Install GLPI database schema when absent
  ansible.builtin.command:
    argv:
      - php
      - bin/console
      - db:install
      - --no-interaction
      - --no-telemetry
  args:
    chdir: "{{ glpi_install_dir }}"
  become: true
  become_user: "{{ glpi_data_owner }}"
  register: glpi_database_install
  changed_when: glpi_database_install.rc == 0
  failed_when: false
  no_log: true
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - (glpi_db_schema_marker.stdout | default('') | trim) == ''

- name: Assert GLPI database schema installation succeeded
  ansible.builtin.assert:
    that:
      - glpi_database_install.rc == 0
    fail_msg: "GLPI database schema installation failed. Validate managed DB privileges and confirm the target database is empty or already contains a valid GLPI schema."
  changed_when: false
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - (glpi_db_schema_marker.stdout | default('') | trim) == ''

- name: Recheck GLPI database schema marker
  ansible.builtin.command:
    argv:
      - mysql
      - --protocol=TCP
      - "--host={{ glpi_db_host }}"
      - "--port={{ mariadb_port }}"
      - "--user={{ glpi_db_user }}"
      - "--database={{ glpi_db_name }}"
      - --batch
      - --skip-column-names
      - --connect-timeout=10
      - "--execute=SHOW TABLES LIKE 'glpi_configs';"
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_db_schema_marker_after
  changed_when: false
  failed_when: false
  no_log: true
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Assert GLPI database schema is ready before web smoke checks
  ansible.builtin.assert:
    that:
      - glpi_db_schema_marker_after.rc == 0
      - (glpi_db_schema_marker_after.stdout | default('') | trim) == 'glpi_configs'
    fail_msg: "GLPI database schema is not ready. Web smoke checks are blocked until the configured database contains a valid GLPI schema."
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Configure GLPI Redis cache and PHP-FPM sessions
  ansible.builtin.command: /usr/local/sbin/glpi-redis-integration.sh
  environment:
    GLPI_PATH: "{{ glpi_install_dir }}"
    GLPI_WEB_USER: "{{ glpi_data_owner }}"
    GLPI_PHP_FPM_SERVICE: "{{ glpi_php_fpm_service }}"
    GLPI_WEB_HTTP_PORT: "{{ web_http_port | string }}"
    GLPI_WEB_HTTPS_PORT: "{{ web_https_port | string }}"
    GLPI_WEB_HOST_HEADER: "{{ glpi_domain }}"
    GLPI_TLS_MODE: "{{ glpi_tls_mode }}"
    GLPI_REDIS_CACHE_PREFIX: "{{ glpi_redis_cache_prefix | default('') }}"
    GLPI_REDIS_SESSION_LOCKING: "{{ glpi_redis_session_locking | default('0') }}"
    GLPI_REDIS_MAXMEMORY: "{{ glpi_redis_maxmemory | default('') }}"
    GLPI_REDIS_MAXMEMORY_POLICY: "{{ glpi_redis_maxmemory_policy | default('') }}"
    GLPI_DEFER_SCHEMA_BOOTSTRAP: "{{ glpi_schema_bootstrap_deferred_effective | string | lower }}"
  register: glpi_redis_integration
  changed_when: "'GLPI_REDIS_INTEGRATION_CHANGED=yes' in (glpi_redis_integration.stdout | default(''))"

- name: Check GLPI HTTP response by hostname header
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_http_port }}/"
    headers:
      Host: "{{ glpi_domain }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302]
    validate_certs: false
  register: glpi_http_hostname_check
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_web_server_type == 'nginx'

- name: Check GLPI HTTP response by app IP header
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_http_port }}/"
    headers:
      Host: "{{ glpi_app_host }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302]
    validate_certs: false
  register: glpi_http_ip_check
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_web_server_type == 'nginx'

- name: Assert nginx default page is not served for GLPI hostname
  ansible.builtin.assert:
    that:
      - "'Welcome to nginx!' not in (glpi_http_hostname_check.content | default(''))"
    fail_msg: "Nginx default page detected for GLPI hostname. GLPI vhost routing is not active."
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_web_server_type == 'nginx'

- name: Assert nginx default page is not served for GLPI app IP
  ansible.builtin.assert:
    that:
      - "'Welcome to nginx!' not in (glpi_http_ip_check.content | default(''))"
    fail_msg: "Nginx default page detected for GLPI app IP. GLPI vhost routing is not active."
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_web_server_type == 'nginx'

- name: Resolve web check base URL for selected engine
  ansible.builtin.set_fact:
    glpi_web_check_scheme: "{{ 'https' if glpi_tls_mode != 'none' else 'http' }}"
    glpi_web_check_port: "{{ web_https_port if glpi_tls_mode != 'none' else web_http_port }}"
    glpi_web_check_host_header: "{{ glpi_domain }}"
    glpi_web_check_base_url: "{{ ('https' if glpi_tls_mode != 'none' else 'http') ~ '://127.0.0.1:' ~ ((web_https_port if glpi_tls_mode != 'none' else web_http_port) | string) }}"
  changed_when: false

- name: Validate HTTP redirects to canonical HTTPS endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ web_http_port }}/glpi-tls-redirect-check?source=local"
    headers:
      Host: "{{ glpi_domain }}"
    follow_redirects: none
    status_code: 301
    validate_certs: false
  register: glpi_http_tls_redirect_check
  changed_when: false
  when:
    - glpi_tls_mode != 'none'
    - glpi_web_server_type in ['apache', 'nginx']

- name: Assert HTTP redirect preserves path and query string
  ansible.builtin.assert:
    that:
      - >-
        glpi_http_tls_redirect_check.location
        == 'https://' ~ glpi_domain ~ ((':' ~ (web_https_port | string)) if (web_https_port | int != 443) else '') ~ '/glpi-tls-redirect-check?source=local'
    fail_msg: "Apache/web HTTP redirect must target the canonical HTTPS hostname while preserving path and query string."
  changed_when: false
  when:
    - glpi_tls_mode != 'none'
    - glpi_web_server_type in ['apache', 'nginx']

- name: Validate local HTTPS virtual host response
  ansible.builtin.uri:
    url: "https://127.0.0.1:{{ web_https_port }}/"
    headers:
      Host: "{{ glpi_domain }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303]
    validate_certs: false
  register: glpi_https_vhost_check
  changed_when: false
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_tls_mode != 'none'
    - glpi_web_server_type in ['apache', 'nginx']

- name: Assert HTTPS does not serve a default web server page
  ansible.builtin.assert:
    that:
      - "'Apache HTTP Server Test Page' not in (glpi_https_vhost_check.content | default(''))"
      - "'Welcome to nginx!' not in (glpi_https_vhost_check.content | default(''))"
      - "'Placeholder page' not in (glpi_https_vhost_check.content | default(''))"
    fail_msg: "Default web server page detected on the canonical HTTPS virtual host."
  changed_when: false
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_tls_mode != 'none'
    - glpi_web_server_type in ['apache', 'nginx']

- name: Validate Apache SSL module and HTTPS listener
  ansible.builtin.shell: |
    set -o pipefail
    apachectl -M 2>/dev/null | grep -Fq ssl_module
    ss -lnt | awk '{print $4}' | grep -Eq '(^|:){{ web_https_port }}$'
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - glpi_web_server_type == 'apache'
    - glpi_tls_mode != 'none'

- name: Check GLPI wizard root endpoint
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303, 500]
    validate_certs: false
  register: glpi_wizard_root_route_check
  failed_when: false
  changed_when: false
  when: glpi_installation_mode_effective == 'wizard'

- name: Check GLPI wizard installer endpoint
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/install/install.php"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303, 404, 500]
    validate_certs: false
  register: glpi_wizard_install_route_check
  failed_when: false
  changed_when: false
  when: glpi_installation_mode_effective == 'wizard'

- name: Assert GLPI wizard is reachable without server error
  ansible.builtin.assert:
    that:
      - (glpi_wizard_root_route_check.status | default(0) | int) != 500
      - (glpi_wizard_install_route_check.status | default(0) | int) != 500
      - >-
        (glpi_wizard_root_route_check.status | default(0) | int) in [200, 301, 302, 303]
        or
        (glpi_wizard_install_route_check.status | default(0) | int) in [200, 301, 302, 303]
      - >-
        'glpi' in ((glpi_wizard_root_route_check.content | default('')) | lower)
        or
        'install' in ((glpi_wizard_root_route_check.content | default('')) | lower)
        or
        'wizard' in ((glpi_wizard_root_route_check.content | default('')) | lower)
        or
        'setup' in ((glpi_wizard_root_route_check.content | default('')) | lower)
        or
        'glpi' in ((glpi_wizard_install_route_check.content | default('')) | lower)
        or
        'install' in ((glpi_wizard_install_route_check.content | default('')) | lower)
        or
        'wizard' in ((glpi_wizard_install_route_check.content | default('')) | lower)
        or
        'setup' in ((glpi_wizard_install_route_check.content | default('')) | lower)
    fail_msg: >-
      GLPI install wizard is not reachable in GLPI_INSTALLATION_MODE=wizard.
      HTTP root={{ glpi_wizard_root_route_check.status | default('unknown') }},
      install={{ glpi_wizard_install_route_check.status | default('unknown') }}.
      Probable causes: config_db.php exists while schema is missing, permissions on
      config={{ glpi_config_dir }}, files={{ glpi_var_dir }}, logs={{ glpi_log_dir }},
      plugins={{ glpi_plugin_dir }},
      PHP error, or vhost/PHP-FPM socket mismatch. Check GLPI PHP logs, web server logs,
      apachectl/nginx configtest, and move config_db.php to a timestamped backup for fresh wizard installs.
  changed_when: false
  when: glpi_installation_mode_effective == 'wizard'

- name: Report GLPI wizard readiness summary
  ansible.builtin.debug:
    msg:
      glpi_installation_mode: "{{ glpi_installation_mode_effective }}"
      glpi_app_files_ready: true
      glpi_wizard_ready: true
      glpi_schema_ready: false
      glpi_user_ready: false
      next_action: "open browser and complete GLPI install wizard after the managed database meets the GLPI version requirements"
  when: glpi_installation_mode_effective == 'wizard'

- name: Check GLPI root endpoint for selected engine
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303]
    validate_certs: false
  register: glpi_root_route_check
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Determine whether installer route must be reachable
  ansible.builtin.set_fact:
    glpi_install_route_expected: "{{ '/install/install.php' in (glpi_root_route_check.content | default('')) }}"
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Check GLPI installer compatibility route
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/install/install.php"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    return_content: true
    follow_redirects: safe
    status_code: [200, 301, 302, 303]
    validate_certs: false
  register: glpi_install_route_check
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_install_route_expected
  changed_when: false

- name: Assert installer route is not returning 404
  ansible.builtin.assert:
    that:
      - glpi_install_route_check.status in [200, 301, 302, 303]
    fail_msg: "Installer route '/install/install.php' failed. Verify web rewrite compatibility with public root."
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - glpi_install_route_expected
  changed_when: false

- name: Extract sample JS/CSS assets from root page
  ansible.builtin.set_fact:
    glpi_asset_paths: >-
      {{
        (
          (glpi_root_route_check.content | default(''))
          | regex_findall('(?:src|href)=["''](/[^"''?#]+\\.(?:js|css))')
          | unique
          | list
        )[:3]
      }}
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Check representative static assets
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}{{ item }}"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: safe
    status_code: [200, 301, 302, 304]
    validate_certs: false
  loop: "{{ glpi_asset_paths }}"
  when:
    - not (glpi_schema_bootstrap_deferred_effective | bool)
    - (glpi_asset_paths | default([])) | length > 0
  changed_when: false

- name: Ensure sensitive paths stay blocked
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/{{ item }}"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: none
    status_code: [403, 404]
    validate_certs: false
  loop:
    - config/config_db.php
    - files/_sessions/
    - vendor/autoload.php
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Ensure arbitrary PHP path is handled by router without server error
  ansible.builtin.uri:
    url: "{{ glpi_web_check_base_url }}/should-not-exist.php"
    headers:
      Host: "{{ glpi_web_check_host_header }}"
    follow_redirects: safe
    status_code: [200, 301, 302, 303, 404]
    validate_certs: false
  changed_when: false
  when: not (glpi_schema_bootstrap_deferred_effective | bool)

- name: Validate PHP timezone default when timezone support is enabled
  ansible.builtin.command: php -r 'echo date_default_timezone_get();'
  register: glpi_php_timezone_default
  changed_when: false
  when: glpi_timezone_support_enabled | default(false) | bool

- name: Assert PHP timezone matches OPERATIONS_TIMEZONE when timezone support is enabled
  ansible.builtin.assert:
    that:
      - (glpi_php_timezone_default.stdout | trim) == timezone_name
    fail_msg: "PHP timezone mismatch. Expected '{{ timezone_name }}' but got '{{ glpi_php_timezone_default.stdout | trim }}'."
  changed_when: false
  when: glpi_timezone_support_enabled | default(false) | bool

- name: Validate APP to DB connectivity using GLPI DB user
  ansible.builtin.command: >-
    mysql --protocol=TCP
    --host={{ glpi_db_host }}
    --port={{ mariadb_port }}
    --user={{ glpi_db_user }}
    --execute=SELECT 1;
  environment:
    MYSQL_PWD: "{{ glpi_db_password }}"
  register: glpi_app_db_connectivity
  changed_when: false
  no_log: true
  when: (database_deployment_mode | default('self_hosted')) != 'managed'
