---
- name: Assert valid Mailpit action
  ansible.builtin.assert:
    that:
      - email_mailpit_action | default('check') in ['check', 'install', 'post-check', 'rollback']
      - glpi_web_server_type in ['nginx', 'apache', 'lighttpd']
      - email_mailpit_ui_path is match('^/.+')
      - email_mailpit_ui_path != '/'
      - email_mailpit_ui_internal_port | int != email_mailpit_smtp_port | int
    fail_msg: "Invalid Mailpit email action, web server type, path, or ports."

- name: Set Mailpit runtime facts
  ansible.builtin.set_fact:
    email_mailpit_action_effective: "{{ email_mailpit_action | default('check') }}"
    email_mailpit_ui_path_normalized: "{{ email_mailpit_ui_path | regex_replace('/+$', '') }}"
    email_mailpit_remote_base_dir: "{{ email_mailpit_remote_base_dir | default('/opt/glpi-mailpit') }}"
    email_mailpit_web_service: "{{ {'nginx': 'nginx', 'apache': 'apache2', 'lighttpd': 'lighttpd'}[glpi_web_server_type] }}"
    email_mailpit_web_config_path: "{{ {'nginx': '/etc/nginx/sites-available/glpi.conf', 'apache': '/etc/apache2/sites-available/glpi.conf', 'lighttpd': '/etc/lighttpd/conf-available/glpi.conf'}[glpi_web_server_type] }}"

- name: Set Mailpit derived paths
  ansible.builtin.set_fact:
    email_mailpit_webroot: "{{ email_mailpit_ui_path_normalized }}/"
    email_mailpit_remote_auth_dir: "{{ email_mailpit_remote_base_dir }}/auth"
    email_mailpit_remote_data_dir: "{{ email_mailpit_remote_base_dir }}/data"
    email_mailpit_remote_tls_dir: "{{ email_mailpit_remote_base_dir }}/tls"
    email_mailpit_remote_compose_path: "{{ email_mailpit_remote_base_dir }}/compose.yml"
    email_mailpit_remote_ui_auth_file: "{{ email_mailpit_remote_base_dir }}/auth/ui.htpasswd"
    email_mailpit_remote_smtp_auth_file: "{{ email_mailpit_remote_base_dir }}/auth/smtp.htpasswd"
    email_mailpit_remote_smtp_cert_file: "{{ email_mailpit_remote_base_dir }}/tls/smtp.crt"
    email_mailpit_remote_smtp_key_file: "{{ email_mailpit_remote_base_dir }}/tls/smtp.key"
    email_mailpit_proxy_scheme: "{{ 'http' if glpi_tls_mode == 'none' else 'https' }}"
    email_mailpit_proxy_port: "{{ web_http_port if glpi_tls_mode == 'none' else web_https_port }}"

- name: Validate Docker and Compose availability
  ansible.builtin.shell: |
    set -eu
    command -v docker >/dev/null 2>&1
    docker compose version >/dev/null 2>&1
    docker info >/dev/null 2>&1
  args:
    executable: /bin/bash
  changed_when: false
  when: email_mailpit_action_effective in ['check', 'install', 'post-check']

- name: Validate openssl availability for SMTP STARTTLS certificate
  ansible.builtin.shell: command -v openssl >/dev/null 2>&1
  changed_when: false
  when: email_mailpit_action_effective == 'install'

- name: Validate selected web service is active
  ansible.builtin.command: "systemctl is-active {{ email_mailpit_web_service }}"
  changed_when: false
  when: email_mailpit_action_effective in ['check', 'install', 'post-check']

- name: Check selected web server config exists
  ansible.builtin.stat:
    path: "{{ email_mailpit_web_config_path }}"
  register: email_mailpit_web_config

- name: Fail when selected web server config is missing
  ansible.builtin.fail:
    msg: "Missing web server config for {{ glpi_web_server_type }}: {{ email_mailpit_web_config_path }}."
  when:
    - email_mailpit_action_effective in ['check', 'install', 'post-check']
    - not email_mailpit_web_config.stat.exists

- name: Detect unmanaged Mailpit proxy path conflicts
  ansible.builtin.shell: |
    set -eu
    if grep -Fq "{{ email_mailpit_ui_path_normalized }}" "{{ email_mailpit_web_config_path }}" &&
       ! grep -Fq "GLPI OPSKIT MAILPIT" "{{ email_mailpit_web_config_path }}"; then
      echo "Path {{ email_mailpit_ui_path_normalized }} already appears in {{ email_mailpit_web_config_path }} outside GLPI OPSKIT MAILPIT markers." >&2
      exit 1
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when: email_mailpit_action_effective in ['check', 'install']

- name: Detect existing Mailpit container ownership
  ansible.builtin.shell: |
    docker inspect {{ email_mailpit_container_name }} --format '{% raw %}{{ index .Config.Labels "com.docker.compose.project" }}{% endraw %}' 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false
  register: email_mailpit_container_project_detected
  when: email_mailpit_action_effective in ['check', 'install', 'post-check']

- name: Fail when container name is not managed by this kit
  ansible.builtin.fail:
    msg: "Existing container '{{ email_mailpit_container_name }}' is not managed by compose project '{{ email_mailpit_compose_project }}'."
  when:
    - email_mailpit_action_effective in ['check', 'install']
    - email_mailpit_container_project_detected.stdout | trim | length > 0
    - email_mailpit_container_project_detected.stdout | trim != email_mailpit_compose_project

- name: Detect port conflicts before Mailpit changes
  ansible.builtin.shell: |
    python3 - "{{ email_mailpit_ui_internal_port }}" "{{ email_mailpit_smtp_port }}" "{{ email_mailpit_container_project_detected.stdout | default('') | trim }}" "{{ email_mailpit_compose_project }}" "{{ email_mailpit_container_name }}" <<'PY'
    import re
    import subprocess
    import sys

    ports = {sys.argv[1], sys.argv[2]}
    managed_project = sys.argv[3]
    expected_project = sys.argv[4]
    managed_container = sys.argv[5]

    try:
        ss = subprocess.run(["ss", "-ltnH"], capture_output=True, text=True, check=False)
    except FileNotFoundError:
        print("ss command is required for port conflict validation.", file=sys.stderr)
        sys.exit(1)

    for line in ss.stdout.splitlines():
        parts = line.split()
        if len(parts) < 4:
            continue
        address = parts[3]
        port = address.rsplit(":", 1)[-1].strip("[]")
        if port in ports and managed_project != expected_project:
            print(f"Port {port} is already listening on this host.", file=sys.stderr)
            sys.exit(1)

    docker = subprocess.run(
        ["docker", "ps", "--format", "{% raw %}{{.Names}}|{{.Ports}}{% endraw %}"],
        capture_output=True,
        text=True,
        check=False,
    )
    for line in docker.stdout.splitlines():
        if "|" not in line:
            continue
        name, published = line.split("|", 1)
        if name == managed_container:
            continue
        for port in ports:
            if re.search(rf"(^|[^\d]){re.escape(port)}->", published) or re.search(rf":{re.escape(port)}->", published):
                print(f"Docker container {name} already publishes host port {port}.", file=sys.stderr)
                sys.exit(1)
    PY
  args:
    executable: /bin/bash
  changed_when: false
  when: email_mailpit_action_effective in ['check', 'install']

- name: Install Mailpit service and proxy
  when: email_mailpit_action_effective == 'install'
  block:
    - name: Create Mailpit directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ email_mailpit_remote_base_dir }}", owner: "root", group: "root", mode: "0750" }
        - { path: "{{ email_mailpit_remote_auth_dir }}", owner: "10001", group: "10001", mode: "0700" }
        - { path: "{{ email_mailpit_remote_data_dir }}", owner: "10001", group: "10001", mode: "0700" }
        - { path: "{{ email_mailpit_remote_tls_dir }}", owner: "10001", group: "10001", mode: "0700" }

    - name: Copy Mailpit UI auth file
      ansible.builtin.copy:
        src: "{{ email_mailpit_local_ui_auth_file }}"
        dest: "{{ email_mailpit_remote_ui_auth_file }}"
        owner: "10001"
        group: "10001"
        mode: "0400"

    - name: Copy Mailpit SMTP auth file
      ansible.builtin.copy:
        src: "{{ email_mailpit_local_smtp_auth_file }}"
        dest: "{{ email_mailpit_remote_smtp_auth_file }}"
        owner: "10001"
        group: "10001"
        mode: "0400"

    - name: Generate Mailpit SMTP STARTTLS certificate
      ansible.builtin.command:
        cmd: >-
          openssl req -x509 -nodes -newkey rsa:4096
          -keyout {{ email_mailpit_remote_smtp_key_file }}
          -out {{ email_mailpit_remote_smtp_cert_file }}
          -days 3650
          -subj /CN={{ glpi_domain }}
      args:
        creates: "{{ email_mailpit_remote_smtp_key_file }}"

    - name: Secure Mailpit SMTP STARTTLS files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "10001"
        group: "10001"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ email_mailpit_remote_smtp_cert_file }}", mode: "0440" }
        - { path: "{{ email_mailpit_remote_smtp_key_file }}", mode: "0400" }

    - name: Deploy Mailpit compose file
      ansible.builtin.template:
        src: compose-mailpit.yml.j2
        dest: "{{ email_mailpit_remote_compose_path }}"
        owner: root
        group: root
        mode: "0640"

    - name: Pull Mailpit image
      ansible.builtin.command:
        cmd: "docker compose -f {{ email_mailpit_remote_compose_path }} pull"
        chdir: "{{ email_mailpit_remote_base_dir }}"

    - name: Start Mailpit compose service
      ansible.builtin.command:
        cmd: "docker compose -f {{ email_mailpit_remote_compose_path }} up -d"
        chdir: "{{ email_mailpit_remote_base_dir }}"

    - name: Enable Apache proxy modules
      ansible.builtin.command: a2enmod proxy proxy_http headers
      register: email_mailpit_apache_modules
      changed_when: "'already enabled' not in (email_mailpit_apache_modules.stdout | default(''))"
      when: glpi_web_server_type == 'apache'

    - name: Enable lighttpd proxy module
      ansible.builtin.command: lighty-enable-mod proxy
      register: email_mailpit_lighttpd_proxy
      changed_when: "'already enabled' not in (email_mailpit_lighttpd_proxy.stdout | default(''))"
      when: glpi_web_server_type == 'lighttpd'

    - name: Configure Nginx Mailpit proxy
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "    # {mark} GLPI OPSKIT MAILPIT"
        insertafter: "client_max_body_size"
        block: "{{ lookup('template', 'nginx-mailpit-location.conf.j2') }}"
      when: glpi_web_server_type == 'nginx'

    - name: Configure Apache Mailpit proxy
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "    # {mark} GLPI OPSKIT MAILPIT"
        insertbefore: "</VirtualHost>"
        block: "{{ lookup('template', 'apache-mailpit-location.conf.j2') }}"
      when: glpi_web_server_type == 'apache'

    - name: Configure lighttpd Mailpit proxy
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "# {mark} GLPI OPSKIT MAILPIT"
        insertafter: EOF
        block: "{{ lookup('template', 'lighttpd-mailpit-location.conf.j2') }}"
      when: glpi_web_server_type == 'lighttpd'

    - name: Validate Nginx after Mailpit proxy
      ansible.builtin.command: nginx -t
      changed_when: false
      when: glpi_web_server_type == 'nginx'

    - name: Validate Apache after Mailpit proxy
      ansible.builtin.command: apachectl -t
      changed_when: false
      when: glpi_web_server_type == 'apache'

    - name: Validate lighttpd after Mailpit proxy
      ansible.builtin.command: lighttpd -tt -f /etc/lighttpd/lighttpd.conf
      changed_when: false
      when: glpi_web_server_type == 'lighttpd'

    - name: Reload selected web service after Mailpit proxy
      ansible.builtin.service:
        name: "{{ email_mailpit_web_service }}"
        state: reloaded

- name: Post-check Mailpit service
  when: email_mailpit_action_effective in ['install', 'post-check']
  block:
    - name: Wait for Mailpit readiness
      ansible.builtin.command: "docker exec {{ email_mailpit_container_name }} /mailpit readyz"
      changed_when: false
      register: email_mailpit_readyz
      retries: 10
      delay: 3
      until: email_mailpit_readyz.rc == 0

    - name: Validate Mailpit SMTP port
      ansible.builtin.shell: |
        python3 - "{{ email_mailpit_smtp_bind_host }}" "{{ email_mailpit_smtp_port }}" <<'PY'
        import socket
        import sys

        host = sys.argv[1]
        port = int(sys.argv[2])
        with socket.create_connection((host, port), timeout=5) as sock:
            banner = sock.recv(128).decode("utf-8", "replace")
        if not banner.startswith("220"):
            print(f"Unexpected SMTP banner: {banner!r}", file=sys.stderr)
            sys.exit(1)
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate Mailpit proxied UI route
      ansible.builtin.shell: |
        status="$(curl -k -s -o /dev/null -w '%{http_code}' -H 'Host: {{ glpi_domain }}' '{{ email_mailpit_proxy_scheme }}://127.0.0.1:{{ email_mailpit_proxy_port }}{{ email_mailpit_webroot }}')"
        case "$status" in
          200|301|302|401) exit 0 ;;
          *) echo "Unexpected Mailpit UI HTTP status: $status" >&2; exit 1 ;;
        esac
      args:
        executable: /bin/bash
      changed_when: false

- name: Roll back Mailpit service and proxy
  when: email_mailpit_action_effective == 'rollback'
  block:
    - name: Check Mailpit compose file
      ansible.builtin.stat:
        path: "{{ email_mailpit_remote_compose_path }}"
      register: email_mailpit_compose_file

    - name: Stop Mailpit compose service
      ansible.builtin.command:
        cmd: "docker compose -f {{ email_mailpit_remote_compose_path }} down"
        chdir: "{{ email_mailpit_remote_base_dir }}"
      when: email_mailpit_compose_file.stat.exists

    - name: Remove Mailpit compose file
      ansible.builtin.file:
        path: "{{ email_mailpit_remote_compose_path }}"
        state: absent

    - name: Remove Nginx Mailpit proxy block
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "    # {mark} GLPI OPSKIT MAILPIT"
        state: absent
      when:
        - glpi_web_server_type == 'nginx'
        - email_mailpit_web_config.stat.exists

    - name: Remove Apache Mailpit proxy block
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "    # {mark} GLPI OPSKIT MAILPIT"
        state: absent
      when:
        - glpi_web_server_type == 'apache'
        - email_mailpit_web_config.stat.exists

    - name: Remove lighttpd Mailpit proxy block
      ansible.builtin.blockinfile:
        path: "{{ email_mailpit_web_config_path }}"
        marker: "# {mark} GLPI OPSKIT MAILPIT"
        state: absent
      when:
        - glpi_web_server_type == 'lighttpd'
        - email_mailpit_web_config.stat.exists

    - name: Validate Nginx after Mailpit rollback
      ansible.builtin.command: nginx -t
      changed_when: false
      when:
        - glpi_web_server_type == 'nginx'
        - email_mailpit_web_config.stat.exists

    - name: Validate Apache after Mailpit rollback
      ansible.builtin.command: apachectl -t
      changed_when: false
      when:
        - glpi_web_server_type == 'apache'
        - email_mailpit_web_config.stat.exists

    - name: Validate lighttpd after Mailpit rollback
      ansible.builtin.command: lighttpd -tt -f /etc/lighttpd/lighttpd.conf
      changed_when: false
      when:
        - glpi_web_server_type == 'lighttpd'
        - email_mailpit_web_config.stat.exists

    - name: Reload selected web service after Mailpit rollback
      ansible.builtin.service:
        name: "{{ email_mailpit_web_service }}"
        state: reloaded
      when: email_mailpit_web_config.stat.exists
